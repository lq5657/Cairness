version: 1
protocol_id: agent-command-protocol
summary: Base command resolution, input validation, path resolution, lifecycle, and error reporting for cc-* agent workflows.

command_flow:
  - resolve_command
  - validate_inputs
  - resolve_paths
  - resolve_language_profile
  - load_runtime_readset
  - execute_runtime_contract
  - validate_result_contract

path_roles:
  framework_root:
    path: .claude
    kind: dir
  state_root:
    path: .cairness
    kind: dir
  project_context:
    path: .cairness/context/project-context.md
    kind: file
  project_summary:
    path: .cairness/context/project-summary.md
    kind: file
  domain_language:
    path: .cairness/context/domain-language.md
    kind: file
  dev_map:
    path: .cairness/context/dev-map.md
    kind: file
  task_board:
    path: .cairness/changes/task-board.md
    kind: file
  change_dir:
    path: .cairness/changes/<change-id>
    kind: dir
  audit_dir:
    path: .cairness/audits/<audit-id>
    kind: dir
  knowledge_root:
    path: .cairness/knowledge
    kind: dir
  discuss_dir:
    path: .cairness/discussions/<discuss-id>
    kind: dir

input_contracts:
  change_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    resolves_to: change_dir
    missing_error: missing_required_input
    invalid_error: invalid_input
  audit_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    resolves_to: audit_dir
    missing_error: missing_required_input
    invalid_error: invalid_input
  discuss_id:
    type: string
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    resolves_to: discuss_dir
    missing_error: none
    invalid_error: invalid_input
  optional_scope:
    type: string
    missing_error: none
    invalid_error: invalid_input
  optional_mode:
    type: string
    missing_error: none
    invalid_error: invalid_input
  # Per-command free-text inputs (registered so commands' inputs.* names are
  # machine-checkable against input_contracts; no pattern = free text).
  requirement_description:
    type: string
    missing_error: missing_required_input
    invalid_error: invalid_input
  topic_description:
    type: string
    missing_error: missing_required_input
    invalid_error: invalid_input
  project_idea:
    type: string
    missing_error: missing_required_input
    invalid_error: invalid_input
  fix_description:
    type: string
    missing_error: none
    invalid_error: invalid_input
  research_depth:
    type: string
    missing_error: none
    invalid_error: invalid_input
  discuss_mode:
    type: string
    missing_error: none
    invalid_error: invalid_input
  continue_discussion:
    type: string
    missing_error: none
    invalid_error: invalid_input
  # Generic mode/scope slots: cc-test mode (supplement/recovery) and
  # cc-inspect-codebase mode (architecture/logic/...) are different concepts,
  # so no enum constraint; runtime argv validation is deferred.
  mode:
    type: string
    missing_error: missing_required_input
    invalid_error: invalid_input
  scope:
    type: string
    missing_error: none
    invalid_error: invalid_input

error_taxonomy:
  missing_required_input:
    status: blocked
    blocking: true
    error_codes: []  # awaits runtime argv validation (E_INPUT* deferred)
  invalid_input:
    status: blocked
    blocking: true
    error_codes: []  # awaits runtime argv validation (E_INPUT* deferred)
  unresolved_path:
    status: blocked
    blocking: true
    error_codes: [E_DOCTOR004, E_DOCTOR006, E_DOCTOR008, E_DOCTOR010, E_UPGRADE001, E_SCHEMA171]
  missing_required_artifact:
    status: blocked
    blocking: true
    error_codes: [E_DOCTOR013, E_UPGRADE004, E_UPGRADE006, E_READSET007, E_SCHEMA117]
  invalid_state:
    status: blocked
    blocking: true
    error_codes: [E_EVENT008, E_EVENT009, E_SCHEMA019, E_SCHEMA020, E_WAVE001, E_WAVE002, E_WAVE003, E_WAVE005]
  readset_drift:
    status: blocked
    blocking: true
    error_codes: [E_READSET008, E_READSET009, E_SCHEMA150, E_SCHEMA151, E_SCHEMA152]
  workflow_runtime_drift:
    status: blocked
    blocking: true
    error_codes: [E_SCHEMA150]
  validation_failed:
    status: blocked
    blocking: true
    error_codes: [E_SCOPE001, E_SCOPE002, E_EVIDENCE001, E_EVIDENCE002, E_EVIDENCE003, E_SYNC001, E_LINT001, E_EVENT019, E_ROLE001, E_ROLE002, E_ROLE003, E_INDEX001]
  user_confirmation_required:
    status: blocked
    blocking: true
    error_codes: []  # interaction layer; no harness check emits this yet
  unsupported_command:
    status: blocked
    blocking: true
    error_codes: []  # agent-facing; no harness check emits this yet
  legacy_fallback_required:
    status: partial
    blocking: false
    error_codes: []  # non-blocking advisory; no harness check emits this yet

result_rendering:
  success_template: .claude/templates/results/command-result.md
  error_template: .claude/templates/results/command-error.md

lifecycle_events:
  change_event_log: .cairness/changes/<change-id>/events.jsonl
  schema: .claude/schemas/command-event.schema.json
  template: .claude/templates/changes/events.jsonl
