version: 1
command: cc-review
source_manifest: .claude/runtime/commands/cc-review.yaml
generated_from:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-review.yaml
- .claude/runtime/result-contracts/standard-command.yaml
- .claude/runtime/profiles/standard.yaml
always_reads:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-review.yaml
- .claude/runtime/result-contracts/standard-command.yaml
- .cc/changes/<change-id>/spec.md
- .cc/changes/<change-id>/tasks.md
- .cc/changes/task-board.md
- .claude/runtime/topic-rules/verification.yaml
- .claude/runtime/profiles/standard.yaml
optional_reads:
- .cc/changes/<change-id>/review.md
- .cc/changes/<change-id>/test-spec.md
- .cc/context/domain-language.md
- .cc/context/mvp-roadmap.md
conditional_reads:
  when_writing_review_artifact:
  - .claude/templates/changes/review.md
  when_interaction_fatigue_detection_applies:
  - .claude/runtime/topic-rules/interaction-guidance.yaml
  when_change_exceeds_triage_threshold:
  - .claude/runtime/topic-rules/change-sizing.yaml
  when_test_boundary_or_substitution_is_in_question:
  - .claude/runtime/topic-rules/testing-strategy.yaml
  when_change_touches_database:
  - .claude/runtime/topic-rules/database-changes.yaml
  when_change_touches_external_contract:
  - .claude/runtime/topic-rules/api-compatibility.yaml
  when_change_touches_configuration:
  - .claude/runtime/topic-rules/configuration.yaml
  when_change_touches_observability:
  - .claude/runtime/topic-rules/observability.yaml
  when_release_lens_is_triggered:
  - .claude/runtime/topic-rules/release.yaml
  when_security_lens_is_triggered:
  - .claude/runtime/topic-rules/security.yaml
  when_external_or_version_sensitive_claims_are_in_scope:
  - .claude/runtime/topic-rules/source-driven-development.yaml
  when_dependency_or_wave_order_is_in_dispute:
  - .claude/runtime/topic-rules/git-workflow.yaml
  when_spec_review_flags_present_in_log:
  - .claude/runtime/topic-rules/spec-code-sync.yaml
  when_go_concurrency_pattern_is_detected:
  - .claude/runtime/topic-rules/go-concurrency.yaml
  when_go_performance_analysis_is_needed:
  - .claude/runtime/topic-rules/go-performance.yaml
  when_subagent_delegation_is_used:
  - .claude/docs/maintenance/subagent-model.md
  - .claude/runtime/subagents/cc-review.yaml
