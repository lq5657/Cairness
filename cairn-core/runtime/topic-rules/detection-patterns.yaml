version: 1
description: >-
  确定性 topic rule 触发模式。基于文件路径和代码内容自动判定哪些 topic rule 应该触发，
  作为 LLM 自判的补充，降低漏判概率。
  cc-topic-trigger 脚本读取本文件，对变更文件做模式匹配，输出触发的 rule 列表。

patterns:
  database_changes:
    file_globs:
      - "**/migrations/**"
      - "**/migration/**"
      - "**/*.sql"
      - "**/db/**"
      - "**/schema/**"
    content_regex:
      - "CREATE\\s+(TABLE|INDEX|SEQUENCE|TYPE)"
      - "ALTER\\s+TABLE"
      - "DROP\\s+(TABLE|INDEX|COLUMN)"
      - "migrate\\.(Up|Down|Steps)"
      - "AddMigration|NewMigration"
      - "AutoMigrate|CreateTable|AddColumn|DropColumn"
      - "golang-migrate"
    import_regex:
      - "database/sql"
      - "github\\.com/golang-migrate"
      - "github\\.com/pressly/goose"
      - "gorm\\.io/gorm"
      - "github\\.com/sqlc-dev/sqlc"
      - "github\\.com/jmoiron/sqlx"
      - "entgo\\.io/ent"

  api_compatibility:
    file_globs:
      - "**/*.proto"
      - "**/*.openapi.*"
      - "**/*.swagger.*"
      - "**/openapi/**"
    content_regex:
      - "func\\s+\\w+\\s*\\(.*http\\.ResponseWriter"
      - "gin\\.(HandlerFunc|Context)"
      - "echo\\.(HandlerFunc|Context)"
      - "grpc\\.(UnaryHandler|StreamHandler|ClientConn)"
      - "\\.Handle\\(|\\.HandleFunc\\("
      - "@app\\.route|@router\\."
      - "protobuf|proto\\.Marshal|proto\\.Unmarshal"
    import_regex:
      - "github\\.com/gin-gonic/gin"
      - "github\\.com/labstack/echo"
      - "google\\.golang\\.org/grpc"
      - "github\\.com/go-chi/chi"
      - "net/http"
      - "github\\.com/gorilla/mux"

  configuration:
    file_globs:
      - "**/.env*"
      - "**/*.config.*"
      - "**/config/**"
      - "**/configs/**"
      - "**/*.properties"
      - "**/*.ini"
      - "**/*.cfg"
    content_regex:
      - "os\\.Getenv|os\\.LookupEnv"
      - "viper\\.(Get|Set|Bind|Read|Write)"
      - "godotenv\\.(Load|Read|Parse)"
      - "envconfig\\.(Process|Usage)"
      - "flag\\.(String|Int|Bool|Parse)"
    import_regex:
      - "github\\.com/spf13/viper"
      - "github\\.com/joho/godotenv"
      - "github\\.com/kelseyhightower/envconfig"
      - "github\\.com/caarlos0/env"

  observability:
    file_globs:
      - "**/log/**"
      - "**/logging/**"
      - "**/metrics/**"
      - "**/tracing/**"
    content_regex:
      - "slog\\.(Info|Error|Warn|Debug|Log|With)"
      - "logrus\\.(Info|Error|Warn|Debug|WithField|WithFields)"
      - "zap\\.(Info|Error|Warn|Debug|L\\(\\)|S\\(\\))"
      - "prometheus\\.(Counter|Gauge|Histogram|Summary)"
      - "metrics\\.(Inc|Add|Set|Observe)"
      - "opentelemetry|otel\\."
      - "span\\.(Start|End|SetAttributes|AddEvent)"
    import_regex:
      - "log/slog"
      - "github\\.com/sirupsen/logrus"
      - "go\\.uber\\.org/zap"
      - "github\\.com/prometheus/client_golang"
      - "go\\.opentelemetry\\.io/otel"

  security:
    file_globs:
      - "**/auth/**"
      - "**/authz/**"
      - "**/middleware/*auth*"
      - "**/security/**"
      - "**/permission/**"
    content_regex:
      - "jwt\\.(New|Sign|Parse|Validate|Token)"
      - "bcrypt\\.(GenerateFromPassword|CompareHashAndPassword)"
      - "oauth2?\\.(Config|Token|Client)"
      - "password\\.(Hash|Verify|Check|Validate)"
      - "rbac\\.|casbin\\."
      - "auth\\.(Sign|Verify|Login|Register|Token)"
    import_regex:
      - "github\\.com/golang-jwt/jwt"
      - "golang\\.org/x/crypto/bcrypt"
      - "golang\\.org/x/oauth2"
      - "github\\.com/casbin"
      - "github\\.com/go-casbin"

  source_driven_development:
    file_globs: []
    content_regex:
      - "github\\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+"
      - "go\\.google\\.golang\\.org/"
      - "cloud\\.google\\.com/go/"
      - "github\\.com/aws/"
      - "github\\.com/Azure/"
      - "k8s\\.io/"
    import_regex: []

  testing_strategy:
    file_globs:
      - "**/*_test.*"
      - "**/test/**"
      - "**/tests/**"
      - "**/testing/**"
      - "**/*.test.*"
      - "**/*_spec.*"
      - "**/*Spec.*"
    content_regex:
      - "func\\s+Test\\w+\\("
      - "func\\s+Benchmark\\w+\\("
      - "func\\s+Fuzz\\w+\\("
      - "describe\\(|it\\(|test\\(|expect\\("
      - "Suite\\("
      - "t\\.(Run|Parallel|Error|Fail|Log)"
    import_regex:
      - "\"testing\""
      - "github\\.com/stretchr/testify"
      - "github\\.com/onsi/ginkgo"

  go_coding_style:
    file_globs:
      - "**/*.go"
    content_regex: []
    import_regex: []

  go_concurrency:
    file_globs:
      - "**/*.go"
    content_regex:
      - "sync\\.(Mutex|RWMutex|WaitGroup|Once|Cond|Pool|Map)"
      - "go\\s+func"
      - "\\bchan\\s"
      - "context\\.(WithCancel|WithTimeout|WithDeadline|Background|TODO)"
      - "atomic\\.(Int32|Int64|Uint32|Uint64|Pointer|Bool|Value)"
      - "sync/atomic"
      - "errgroup\\."
      - "singleflight\\."
      - "golang\\.org/x/sync"
      - "goroutine"
      - "\\.Lock\\(\\)"
      - "\\.RLock\\(\\)"
    import_regex:
      - "\"sync\""
      - "\"context\""
      - "\"sync/atomic\""
      - "golang\\.org/x/sync"

  go_performance:
    file_globs:
      - "**/*.go"
    content_regex:
      - "func\\s+Benchmark\\w+\\("
      - "benchstat"
      - "pprof"
      - "-benchmem"
      - "-cpuprofile"
      - "-memprofile"
      - "strings\\.Builder"
      - "sync\\.Pool"
      - "make\\(\\[\\].*,\\s*0\\s*,\\s*\\d+\\)"
      - "-gcflags"
      - "check_bce"
      - "GOGC"
      - "GOMEMLIMIT"
      - "PGO"
      - "default\\.pgo"
      - "fieldalignment"
      - "\\.Grow\\("
    import_regex:
      - "\"testing\""
      - "\"runtime/pprof\""
      - "\"net/http/pprof\""
      - "\"strings\""
      - "\"sync\""

  python_coding_style:
    file_globs:
      - "**/*.py"
    content_regex: []
    import_regex: []

  python_concurrency:
    file_globs:
      - "**/*.py"
    content_regex:
      - "async\\s+def"
      - "await\\s+"
      - "asyncio\\."
      - "threading\\.(Thread|Lock|RLock|Event|Condition|Semaphore)"
      - "multiprocessing\\.(Process|Pool|Queue|Manager)"
      - "concurrent\\.futures"
      - "ThreadPoolExecutor|ProcessPoolExecutor"
      - "asyncio\\.(create_task|gather|Queue|Lock|Semaphore|wait_for)"
      - "loop\\.run_in_executor"
      - "asyncio\\.to_thread"
      - "os\\.fork"
    import_regex:
      - "import asyncio"
      - "import threading"
      - "import multiprocessing"
      - "from concurrent"

  python_performance:
    file_globs:
      - "**/*.py"
    content_regex:
      - "cProfile|profile|pstats"
      - "scalene|py-spy|pyinstrument|memray"
      - "tracemalloc"
      - "time\\.perf_counter"
      - "@lru_cache|functools\\.lru_cache"
      - "__slots__"
      - "@dataclass\\(slots=True\\)"
      - "numba|numpy|pandas|polars"
      - "\\.join\\(|''\\.join"
      - "collections\\.deque"
      - "yield\\s"
    import_regex:
      - "import cProfile"
      - "import tracemalloc"
      - "from numba"
      - "import numpy"
      - "import polars"

  java_coding_style:
    file_globs:
      - "**/*.java"
    content_regex: []
    import_regex: []

  java_concurrency:
    file_globs:
      - "**/*.java"
    content_regex:
      - "synchronized\\s*\\("
      - "ReentrantLock|ReentrantReadWriteLock|StampedLock"
      - "volatile\\s+"
      - "AtomicInteger|AtomicLong|AtomicReference|AtomicBoolean"
      - "Thread\\.(start|sleep|join|interrupt)"
      - "ExecutorService|Executors\\."
      - "CompletableFuture"
      - "virtualThread|newVirtualThreadPerTaskExecutor"
      - "StructuredTaskScope"
      - "ConcurrentHashMap"
      - "CountDownLatch|CyclicBarrier|Semaphore"
      - "ThreadLocal|ScopedValue"
    import_regex:
      - "java\\.util\\.concurrent"
      - "java\\.util\\.concurrent\\.atomic"
      - "java\\.util\\.concurrent\\.locks"

  java_performance:
    file_globs:
      - "**/*.java"
    content_regex:
      - "@Benchmark|@Setup|@TearDown"
      - "JMH|jmh"
      - "StringBuilder"
      - "new\\s+ArrayList<>\\(\\d+\\)"
      - "new\\s+HashMap<>\\(\\d+\\)"
      - "System\\.gc\\(\\)"
      - "finalize\\(\\)"
      - "@EntityGraph|JOIN\\s+FETCH"
      - "G1GC|ZGC|-Xmx|-Xms"
      - "GC\\.|GarbageCollector"
    import_regex:
      - "org\\.openjdk\\.jmh"
      - "java\\.lang\\.ref"

  typescript_coding_style:
    file_globs:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
    content_regex: []
    import_regex: []

  typescript_concurrency:
    file_globs:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
    content_regex:
      - "async\\s+\\("
      - "await\\s+"
      - "new\\s+Promise"
      - "Promise\\.(all|race|allSettled|any)"
      - "setTimeout|setInterval"
      - "addEventListener|removeEventListener"
      - "AbortController|AbortSignal"
      - "new\\s+Worker\\("
      - "no-floating-promises"
      - "forEach.*async"
      - "for\\s*\\(.*await"
    import_regex:
      - "from\\s+['\"].*worker"

  typescript_performance:
    file_globs:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
    content_regex:
      - "React\\.lazy|React\\.memo|useMemo|useCallback"
      - "dynamic\\s*import\\s*\\("
      - "lazy\\s*\\("
      - "getBoundingClientRect|getComputedStyle"
      - "requestAnimationFrame"
      - "IntersectionObserver"
      - "performance\\.now|PerformanceObserver"
      - "react-window|@tanstack/virtual"
      - "lighthouse|Core\\s+Web\\s+Vitals"
      - "FCP|LCP|TTI|CLS|INP"
      - "debounce|throttle"
      - "WeakMap|WeakSet|WeakRef"
    import_regex:
      - "react-window|@tanstack/virtual"

  cpp_coding_style:
    file_globs:
      - "**/*.cpp"
      - "**/*.cc"
      - "**/*.cxx"
      - "**/*.hpp"
      - "**/*.h"
    content_regex: []
    import_regex: []

  cpp_concurrency:
    file_globs:
      - "**/*.cpp"
      - "**/*.cc"
      - "**/*.cxx"
      - "**/*.hpp"
      - "**/*.h"
    content_regex:
      - "std::thread"
      - "std::mutex|std::shared_mutex|std::recursive_mutex"
      - "std::lock_guard|std::scoped_lock|std::unique_lock"
      - "std::atomic|std::atomic_ref"
      - "memory_order"
      - "std::condition_variable"
      - "std::async|std::future|std::promise"
      - "std::jthread|std::stop_token"
      - "std::shared_ptr"
      - "\\.join\\(\\)|\\.detach\\(\\)"
    import_regex:
      - "#include\\s*<thread>"
      - "#include\\s*<mutex>"
      - "#include\\s*<atomic>"
      - "#include\\s*<condition_variable>"
      - "#include\\s*<future>"
      - "#include\\s*<shared_mutex>"

  cpp_performance:
    file_globs:
      - "**/*.cpp"
      - "**/*.cc"
      - "**/*.cxx"
      - "**/*.hpp"
      - "**/*.h"
    content_regex:
      - "std::move|std::forward"
      - "std::string_view|std::span"
      - "\\.reserve\\("
      - "noexcept"
      - "\\[\\[nodiscard\\]\\]"
      - "\\[\\[likely\\]\\]|\\[\\[unlikely\\]\\]"
      - "constexpr"
      - "restrict|__restrict"
      - "alignas"
      - "-O2|-O3|-march=native|-flto"
      - "PGO|fprofile-generate|fprofile-use"
      - "perf\\s+record|perf\\s+stat"
      - "valgrind.*callgrind"
      - "cache.line|cache.miss"
    import_regex:
      - "#include\\s*<string_view>"
      - "#include\\s*<span>"

  release:
    file_globs:
      - "**/CHANGELOG*"
      - "**/VERSION"
      - "**/version.*"
      - "**/Dockerfile"
      - "**/Makefile"
      - "**/docker-compose*"
      - "**/.goreleaser*"
      - "**/deploy/**"
      - "**/k8s/**"
      - "**/helm/**"
      - "**/*.yaml.ci"
      - "**/Taskfile*"
    content_regex:
      - "version\\s*=\\s*[\"']?\\d+\\.\\d+"
      - "VERSION\\s*=\\s*\\d+"
      - "app\\.Version|BuildVersion"
    import_regex: []
