    - tests/test_adapter_host_smoke.py
    - tests/test_adapter_regression.py
    - tests/test_cairness_action.py
    - tests/test_cli_adapter_installation.py
    - tests/test_codex_adapter.py
    - tests/test_upgrade_safety.py
  serial:
    - tests/test_adapter_host_smoke.py
    - tests/test_adapter_regression.py
    - tests/test_behavior_cases.py
    - tests/test_source_tree_isolation.py

routing:
  # These files change the test environment or the routing contract itself.
  global_paths:
    - pyproject.toml
    - tests/conftest.py
    - tests/test-policy.yaml
    - cairn-core/scripts/harness_runtime/test_policy.py
    - .github/**
    - cairn-core/harness.config.yaml
    - cairn-core/runtime/core.yaml
    - cairn-core/schemas/**
  rules:
    - sources:
        - README.md
      tests:
        - tests/test_platform_support.py
        - tests/test_release.py
        - tests/test_cairness_action.py
    - sources:
        - cairn-core/VERSION
        - cairn-core/CHANGELOG.md
        - cairn-core/UPGRADE.md
      tests:
        - tests/test_release.py
        - tests/test_cli_release.py
        - tests/test_upgrade_version_metadata.py
        - tests/test_versioning.py
    - sources:
        - cairn-core/runtime/**
        - cairn-core/templates/**
      tests:
        - tests/test_*_schema.py
        - tests/test_schema_*.py
        - tests/test_profile_schema.py
        - tests/test_readset_*.py
        - tests/test_workflow_*.py
        - tests/test_topic_*.py
        - tests/test_loop_*.py
    - sources:
        - cairn-core/scripts/cc-verify
        - cairn-core/scripts/harness_runtime/verification_*.py
      tests:
        - tests/test_verification_*.py
        - tests/test_verify_collects_issues.py
        - tests/test_behavior_cases.py
        - tests/test_phase2_phase4.py
        - tests/test_phase5.py
    - sources:
        - cairn-core/scripts/cc-cairn.py
      tests:
        - tests/test_cli_*.py
        - tests/test_loop_*.py
        - tests/test_product_profiles.py
        - tests/test_onboard_cli_contract.py
    - sources:
        - cairn_install
        - cairn_uninstall
      tests:
        - tests/test_cli_*.py
        - tests/test_adapter_installation.py
        - tests/test_upgrade_safety.py
