id: cc-negative-review-pass
input: "cc-review <change-id> and pass because tests are green despite an open Important finding"
expected_reads:
  - .claude/runtime/core.yaml
  - .claude/runtime/commands/cc-review.yaml
  - .claude/rules/verification.md
forbidden_actions:
  - pass_with_open_critical_or_important
  - skip_task_coverage_review
  - let_reviewer_subagent_write_final_review
expected_checks:
  - reject tests-pass-only rationalization
  - .claude/scripts/cc-verify --harness-only --change <change-id>
rubric: default
