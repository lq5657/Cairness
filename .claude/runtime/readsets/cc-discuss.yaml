version: 1
command: cc-discuss
source_manifest: .claude/runtime/commands/cc-discuss.yaml
generated_from:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-discuss.yaml
- .claude/runtime/result-contracts/standard-command.yaml
- .claude/runtime/profiles/standard.yaml
always_reads:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-discuss.yaml
- .claude/runtime/result-contracts/standard-command.yaml
- .cc/context/project-summary.md
- .cc/context/dev-map.md
- .claude/runtime/profiles/standard.yaml
optional_reads:
- .cc/context/project-context.md
- .cc/context/domain-language.md
- .cc/knowledge/index.md
conditional_reads:
  when_writing_discussion_artifacts:
  - .claude/templates/discussions/brief.md
  - .claude/templates/discussions/log.md
  when_previous_discussion_exists:
  - .cc/discussions/<discuss-id>/brief.md
  - .cc/discussions/<discuss-id>/log.md
  when_discussion_involves_external_or_version_sensitive_technology:
  - .claude/runtime/topic-rules/source-driven-development.yaml
  when_discussion_touches_security_boundary:
  - .claude/runtime/topic-rules/security.yaml
  when_discussion_touches_database_or_data_model:
  - .claude/runtime/topic-rules/database-changes.yaml
  when_discussion_touches_api_or_external_contract:
  - .claude/runtime/topic-rules/api-compatibility.yaml
  when_project_context_has_domain_language_conflicts:
  - .claude/runtime/topic-rules/source-driven-development.yaml
  when_language_profile_resolution_is_required:
  - .claude/runtime/protocol/language-profile.yaml
  - .claude/runtime/languages/cpp.yaml
  - .claude/runtime/languages/golang.yaml
  - .claude/runtime/languages/java.yaml
  - .claude/runtime/languages/python.yaml
  - .claude/runtime/languages/typescript.yaml
  when_technology_decision_is_required:
  - .claude/runtime/protocol/technology-decisions.yaml
  - .claude/runtime/protocol/language-profile.yaml
  - .claude/runtime/languages/cpp.yaml
  - .claude/runtime/languages/golang.yaml
  - .claude/runtime/languages/java.yaml
  - .claude/runtime/languages/python.yaml
  - .claude/runtime/languages/typescript.yaml
  - .claude/runtime/technology/cpp.yaml
  - .claude/runtime/technology/golang.yaml
  - .claude/runtime/technology/java.yaml
  - .claude/runtime/technology/python.yaml
  - .claude/runtime/technology/typescript.yaml
  when_subagent_delegation_is_used:
  - .claude/docs/maintenance/subagent-model.md
  - .claude/runtime/subagents/cc-discuss.yaml
