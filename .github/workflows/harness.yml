name: harness

on:
  push:
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Create framework symlink
        run: ln -s cairn-core .claude
      - name: Create state skeleton
        run: mkdir -p .cairness/context .cairness/changes .cairness/audits .cairness/knowledge .cairness/discussions
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: python -m pip install pyyaml
      - name: Verify Harness
        run: .claude/scripts/cc-verify --harness-only --verbose
      - name: Validate Evals
        run: .claude/scripts/cc-eval .claude/evals
      - name: Verify Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/go-http-user-service --verbose
      - name: Verify Python Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/python-cli-package --verbose
      - name: Verify C++ Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/cpp-library --verbose
      - name: Verify Java Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/java-tooling-service --verbose
      - name: Install TypeScript Fixture Dependencies
        run: npm install --no-package-lock
        working-directory: cairn-core/fixtures/typescript-react-spa
      - name: Verify TypeScript Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/typescript-react-spa --verbose
