id: git_workflow
description: "cc_spec Harness 的分支、提交与变更映射规范"

trigger:
  - "任何命令需要创建、切换、检查分支，或执行 commit、记录 commit、归档合并状态"
  - "cc-apply / cc-fix / cc-test / cc-archive 需要确认 change-id 与分支、提交和验证证据一致"
  - "worktree 中存在无关修改、未跟踪文件或分支命名例外"

skip:
  - "不用它决定业务实现范围、验证等级或 review 结论"
  - "不用 commit 成功替代 cc-verify、role check、schema check 或 fresh evidence"
  - "不允许用本规则绕过用户明确要求的暂停、人工处理或无关改动保护"

process:
  - "检查当前分支、change-id、dirty worktree 和 auto_commit 配置"
  - "只暂存和提交当前 change 相关文件；发现无关修改先停止或记录人工处理"
  - "commit 前确认当前命令声明的验证已通过或阻塞状态已记录"
  - "在 change 文档中记录 commit、分支例外、待提交或待合并状态"

anti_rationalization:
  - claim: "顺手把无关文件一起提交"
    reality: "无关 diff 会破坏 change 可审查性和回滚边界"
  - claim: "验证稍后再跑，先提交"
    reality: "commit 会固化未验证状态"
  - claim: "当前就在 main 上，改动很小"
    reality: "主分支直接开发绕过 change 分支契约"

red_flags:
  - "默认主分支上直接开发或提交"
  - "commit 包含 .codex、临时文件、无关业务 diff 或其他 change 的产物"
  - "auto_commit: false 仍执行自动 commit"
  - "require_clean_worktree_before_commit: true 但未展示 dirty worktree 摘要"

checks:
  - "commit 前后的 git status 与暂存范围可解释"
  - "commit message 使用 [<change-id>] <中文简述> 并与 change 元数据一致"
  - "change 文档已记录 commit、待提交、分支例外或待合并状态"

rules:
  branch_contract:
    - "每个 change-id 必须绑定一个工作分支"
    - "默认一个 change 一个分支，不是一个 task 一个分支"
    - "同一 change-id 下的多个 task 在同一工作分支内逐个提交"
    - "推荐命名：功能开发 feat/<change-id>，review 后修复 fix/<change-id>"
    - "cc-apply 开始前，当前分支必须与该变更匹配；非推荐命名须在 log.md 记录原因"
    - "禁止在默认主分支（main/master）直接开发"

  change_branch_mapping:
    - "一个进行中的 change-id 默认只对应一个活跃工作分支"
    - "cc-fix 默认在原变更分支继续增量修复；改用 fix/<change-id> 须在 log.md 记录切换原因"
    - "多个 change 共享同一分支视为高风险例外，须维护者确认并记录原因"

  commit_granularity:
    - "默认一个 task 一个 commit；中间修复提交须在 log.md 说明"
    - "一个 change 可包含多个 task commit；不要求每个 task 单独创建分支"
    - "commit 前必须满足当前变更声明的最低验证等级"
    - "commit 仅允许包含当前 change-id 相关修改；无关改动不得静默混入"
    - "是否自动 commit 由 harness.config.yaml 的 auto_commit 决定；缺失时默认 true"
    - "require_clean_worktree_before_commit: true 时须先展示 dirty worktree 摘要"
    - "auto_commit: false 时只更新文档中的对应 commit 为待提交，不执行 git commit"

  commit_message:
    format: "[<change-id>] <中文简述>"
    rules:
      - "change-id 必须与 spec.md 顶部元数据一致"
      - "中文简述应描述本次 task 或 fix 的直接结果，不用泛化描述"

  merge_and_archive:
    - "允许手动 push 工作分支到远程仓库"
    - "禁止 AI 自动 push；是否 push 由用户或团队流程决定"
    - "禁止 AI 自动 merge 到 main/master；主分支合并须人工审查后执行"
    - "cc-archive 前置条件：review.md 允许归档且 spec.md 处于 review 状态"
    - "归档时尚未合并须在 log.md 记录待合并状态"
    - "归档前发生 rebase/cherry-pick/手工解决冲突须在 log.md 记录影响范围和结论"

  branch_handoff_between_changes:
    - "cc-archive 不会自动切回主分支；归档完成时 worktree 仍停在 feat/<change-id> 分支"
    - "在开启下一个 change 前，必须先把当前 feat 分支推送/合并并切回主分支拉取最新基线"
    - "禁止从一个已归档但未合并的 feat 分支上直接拉新 feat 分支；这会让新 change 携带上一个 change 的 commits，后续合并会冲突或重复"
    - "推荐顺序：cc-archive → 人工 push/PR/合并 feat/<A> → git checkout main → git pull → git checkout -b feat/<B> → cc-propose B"
    - "cc-archive 完成时必须向用户输出本节顺序作为 next_action 提示，不得只说 done 就结束"
    - "cc-propose / cc-apply 在检测到当前分支属于另一个已归档 change 时，应提示用户先回主分支再开新 change"

relevance:
  category: default_skip
  triggers:
    - when_change_has_dependency_or_parallelism_constraints
    - when_finding_touches_dependency_or_wave_order
    - when_dependency_or_wave_order_is_in_dispute
