command: cc-apply
summary: Implement one formal change task-by-task and promote the change to review only after evidence is fresh.

category: change
roles:
  - pm-orchestrator
  - developer
  - test-verifier
  - context-curator
  - backlog-curator
  - gatekeeper
outputs:
  - business_code_changes
  - change_docs_update
  - dev_map_update_if_needed
  - task_board_update
  - optional_commits
validates:
  - hard_gate
  - task_gate
  - minimum_verification
  - git_policy
  - dirty_worktree_policy
  - baseline_delta
  - memory_sync
  - hard_gate_resolution_choice
inputs:
  required:
    - change_id

state:
  change_from:
    - propose
    - apply
  change_to: review

writes:
  - task_declared_code_files
  - test_files
  - .cairness/changes/<change-id>/spec.md
  - .cairness/changes/<change-id>/tasks.md
  - .cairness/changes/<change-id>/log.md
  - .cairness/changes/<change-id>/test-spec.md
  - .cairness/context/dev-map.md
  - .cairness/changes/task-board.md

forbids:
  - out_of_scope_change_without_spec_review_flag
  - silently_expand_implementation_beyond_spec_boundary
  - defer_minimum_verification_to_cc_test
  - mark_done_without_evidence
  - auto_push_or_merge
  - start_apply_with_stale_or_missing_hard_gate
  - treat_missing_hard_gate_as_user_confirmation
  - dispatch_tasks_across_waves_in_parallel
  - start_next_wave_with_unresolved_blocked_tasks
  - skip_wave_confirmation_gate
  - manually_edit_wave_plan_json

required_reads:
  - .cairness/changes/<change-id>/spec.md
  - .cairness/changes/<change-id>/tasks.md
  - .cairness/context/dev-map.md
  - .cairness/changes/task-board.md
  - .claude/harness.config.yaml
  - .cairness/knowledge/index.md

conditional_reads:
  when_creating_test_spec_artifact:
    - .claude/templates/changes/test-spec.md

runtime_protocol_reads:
  language_profile: on_demand
  technology_catalog: never

preconditions:
  - spec_and_tasks_exist
  - hard_gate_confirmed_for_current_revisions
  - depends_on_satisfied_verified_by_cc_deps_check
  - branch_matches_change_and_is_not_main
  - save_pre_apply_baseline_before_first_code_edit
  - wave_plan_generated_and_valid_or_resolution_presented
  - only_one_wave_may_be_in_progress
  - run_deterministic_topic_rule_detection
  - run_cc_deps_check_before_first_task

interaction_contract:
  mode: interactive_required
  hard_gate:
    when: hard_gate_missing_stale_or_does_not_cover_current_revisions
    presentation:
      - show_missing_or_stale_hard_gate_fields
      - ask_user_to_return_to_confirm_revise_or_block_apply
      - wait_for_user_choice_before_code_edit
    confirmation_options:
      - return_to_cc_propose_confirm_scope
      - revise_spec_or_tasks
      - block_apply
    required_confirmations:
      - confirmed_spec_revision
      - confirmed_tasks_revision
      - confirmed_scope
      - resolved_risk_decisions
      - accepted_residual_risks
    blocking_behavior:
      - do_not_start_apply_until_hard_gate_current
      - next_action_must_be_resolve_hard_gate

topic_rules:
  when_interaction_fatigue_detection_applies:
    - .claude/runtime/topic-rules/interaction-guidance.yaml
  always:
    - .claude/runtime/topic-rules/verification.yaml
    - .claude/runtime/topic-rules/coding-style.yaml
  when_task_touches_logic_bug_chain_or_data_access:
    - .claude/runtime/topic-rules/testing-strategy.yaml
  when_task_touches_database:
    - .claude/runtime/topic-rules/database-changes.yaml
  when_task_touches_external_contract:
    - .claude/runtime/topic-rules/api-compatibility.yaml
  when_task_touches_configuration:
    - .claude/runtime/topic-rules/configuration.yaml
  when_task_touches_observability:
    - .claude/runtime/topic-rules/observability.yaml
  when_task_touches_release_or_rollback:
    - .claude/runtime/topic-rules/release.yaml
  when_task_touches_security_boundary:
    - .claude/runtime/topic-rules/security.yaml
  when_task_depends_on_external_or_version_sensitive_technology:
    - .claude/runtime/topic-rules/source-driven-development.yaml
  when_change_has_dependency_or_parallelism_constraints:
    - .claude/runtime/topic-rules/git-workflow.yaml
  when_spec_boundary_divergence_detected_during_implementation:
    - .claude/runtime/topic-rules/spec-code-sync.yaml
  when_go_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/go-concurrency.yaml
  when_go_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/go-performance.yaml
  when_python_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/python-concurrency.yaml
  when_python_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/python-performance.yaml
  when_java_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/java-concurrency.yaml
  when_java_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/java-performance.yaml
  when_typescript_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/typescript-concurrency.yaml
  when_typescript_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/typescript-performance.yaml
  when_cpp_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/cpp-concurrency.yaml
  when_cpp_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/cpp-performance.yaml
  when_knowledge_keyword_matched:
    - .claude/runtime/topic-rules/knowledge-loading.yaml

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  contract: .claude/runtime/subagents/cc-apply.yaml

anti_rationalizations:
  - claim_small_change_without_minimum_verification
  - mark_task_done_before_fresh_evidence
  - defer_apply_minimum_verification_to_cc_test
  - let_subagent_output_bypass_main_flow_merge
  - silently_expand_scope_because_boundary_discovery_feels_obvious
  - skip_spec_review_flag_because_change_seems_trivial
  - skip_task_board_updated_by_because_governance_assets_are_not_code
  - claim_tasks_are_independent_without_disjoint_write_check
  - skip_wave_gate_because_all_tasks_in_wave_passed
  - treat_single_task_failure_as_wave_failure

red_flags:
  - dirty_worktree_contains_out_of_scope_files
  - task_write_scope_is_not_declared
  - validation_mapping_would_close_without_evidence
  - baseline_delta_contains_new_failure
  - spec_boundary_discovered_but_spec_review_flag_not_recorded_in_log
  - implementation_expanded_beyond_declared_scope_without_flag_or_user_choice
  - task_board_updated_by_not_cc_apply
  - wave_contains_tasks_with_overlapping_write_sets
  - blocked_task_in_wave_committed_anyway
  - wave_plan_not_disjoint_verified

steps:
  - verify_hard_gate_current_or_present_resolution_choices
  - mark_change_apply
  - generate_wave_plan_via_cc_wave_plan
  - present_wave_confirmation_gate_and_wait
  - capture_pre_wave_baseline
  - dispatch_wave_task_workers_in_parallel
  - merge_subagent_results
  - run_per_task_validation_and_delta
  - commit_passing_tasks_one_task_one_commit
  - mark_failed_tasks_blocked_or_partial
  - write_wave_summary_and_backfill_tasks_wave_overview
  - present_wave_gate_proceed_or_block_next_wave
  - run_final_change_validation
  - promote_change_to_review
  - record_state_transition_event_via_cc_event_write

auto_validation:
  - .claude/scripts/cc-deps check --change <change-id>
  - .claude/scripts/cc-wave-plan --check --change <change-id>
  - .claude/scripts/cc-verify --json --output .cairness/changes/<change-id>/baseline/pre-apply.json --change <change-id>
  - .claude/scripts/cc-delta-check --before <before-report> --after <after-report>
  - .claude/scripts/cc-verify --change <change-id>
  - .claude/scripts/cc-budget-check

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - baseline_delta
      - task_evidence
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - run_cc_review_or_fix_validation
    - resolve_hard_gate_before_apply

stop_conditions:
  - missing_required_argument
  - hard_gate_not_confirmed
  - stale_hard_gate_for_current_revisions
  - user_choice_required_for_missing_hard_gate
  - baseline_capture_failed
  - minimum_verification_missing
  - delta_reports_new_failure
  - final_validation_failed
  - spec_boundary_discovered_user_choice_required_for_flag_or_scope_update
  - wave_plan_invalid_or_cycles_or_overlapping_writes
  - wave_confirmation_not_granted
  - unresolved_blocked_tasks_blocking_next_wave
