command: cc-archive
summary: Archive a reviewed change, optionally compound reusable knowledge, and set status to done only when closure is clean.
summary_zh: 归档已审查的 change,可选沉淀可复用知识,仅在收尾干净时置为 done。

category: change
roles:
  - pm-orchestrator
  - backlog-curator
  - gatekeeper
outputs:
  - done_status
  - archival_log
  - task_board_archive_state
  - optional_knowledge
validates:
  - review_pass
  - no_open_findings
  - no_blocked_tasks
  - no_unexplained_gap
  - fresh_evidence
  - memory_policy
  - knowledge_decision_user_choice
inputs:
  required:
    - change_id

state:
  change_from:
    - review
  change_to: done

writes:
  - .cairness/changes/<change-id>/spec.md
  - .cairness/changes/<change-id>/log.md
  - .cairness/changes/<change-id>/events.jsonl
  - .cairness/changes/task-board.md
  - .cairness/knowledge/<category>/*.md
  - .cairness/knowledge/refinement-candidates/*.md


forbids:
  - business_code_write
  - skip_knowledge_decision
  - archive_with_open_or_blocked_state
  - set_done_from_other_command
  - infer_knowledge_decision_without_user_choice
  - mark_done_before_knowledge_choice
  - freeform_edit_of_knowledge_index_md

required_reads:
  - .cairness/changes/<change-id>/review.md
  - .cairness/changes/<change-id>/log.md
  - .cairness/changes/task-board.md
  - .claude/rules/memory-policy.md

optional_reads:
  - .cairness/knowledge/index.md

conditional_reads:
  when_writing_knowledge_entry:
    - .claude/templates/knowledge/entry.md

runtime_protocol_reads:
  language_profile: on_demand
  technology_catalog: never

topic_rules:
  when_gate_degradation_detected:
    - .claude/runtime/topic-rules/gate-effectiveness.yaml

preconditions:
  - review_exists_and_allows_archive
  - spec_status_is_review
  - no_open_findings_or_blocked_tasks
  - no_unexplained_gap
  - fresh_verification_evidence_exists
  - run_knowledge_freshness_check_before_compounding
  - classify_project_knowledge_vs_harness_refinement_candidate
  - do_not_convert_refinement_candidate_to_rule_without_maintenance_change
  - knowledge_compounding_decision_is_explicit
  - check_gate_degradation_before_archive_and_surface_candidates

interaction_contract:
  # standard mode: knowledge decision and archive status require explicit user choice
  # loop mode: auto-archives when conditions met; defaults knowledge to no_knowledge_compounding
  mode: interactive_required
  loop_mode_override:
    when: profile_is_loop_and_loop_config_exists
    archive_handler: auto_archive
    auto_approve_when:
      - verification_green_and_no_open_findings_and_scope_within_envelope
    knowledge_default: use_trust_envelope_knowledge_default
    audit: write_archive_decision_to_loop_audit_file
    escalate_when:
      - verification_failed
      - open_important_or_critical_findings_remain
      - knowledge_has_obvious_high_value_candidate
  selection:
    when: knowledge_candidates_or_compounding_decision_required
    presentation:
      - show_knowledge_candidates_and_recommended_landing
      - show_project_knowledge_and_refinement_candidates_separately
      - ask_user_to_choose_knowledge_decision
      - wait_for_user_choice_before_marking_done
    confirmation_options:
      - no_knowledge_compounding
      - create_new_knowledge
      - update_existing_knowledge
      - record_refinement_candidate_only
      - defer_refinement_to_maintenance_change
    required_confirmations:
      - knowledge_decision
      - knowledge_destination_when_needed
      - refinement_candidate_decision_when_needed
      - archive_status
    blocking_behavior:
      - do_not_mark_done_until_knowledge_decision_explicit
      - next_action_must_be_choose_knowledge_compounding_option

steps:
  - record_role_baseline_before_first_command_write
  - classify_knowledge_candidate_as_none_new_or_update
  - classify_project_knowledge_vs_harness_refinement_candidate
  - if_knowledge_is_needed_select_destination
  - record_refinement_candidate_without_modifying_runtime
  - present_knowledge_decision_options_and_wait_for_choice
  - load_knowledge_entry_template_before_writing
  - run_gate_degradation_check_and_report_findings
  - rerun_pre_archive_validation
  - transition_state_review_to_done_via_cc_state_transition
  - sync_log_and_task_board
  - rerun_post_archive_validation
  - remind_user_to_return_to_default_branch_before_next_change

auto_validation:
  - .claude/scripts/cc-verify --change <change-id>
  - .claude/scripts/cc-index-check

anti_rationalizations:
  - treat_project_knowledge_as_framework_rule
  - promote_user_correction_to_runtime_rule_without_maintenance_change
  - mark_done_before_refinement_candidate_disposition
  - skip_log_update_because_archive_is_the_final_step
  - skip_task_board_updated_by_because_governance_is_implicit

red_flags:
  - task_board_updated_by_not_cc_archive
  - log_missing_archive_stage_entry

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - archive_validation
      - knowledge_decision
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - stop_change_complete
    - choose_knowledge_compounding_option
    - choose_refinement_candidate_disposition
    - prepare_branch_for_next_change

stop_conditions:
  - missing_required_argument
  - review_not_passed
  - stale_or_missing_evidence
  - knowledge_decision_missing
  - refinement_candidate_decision_missing
  - user_choice_required_for_knowledge_compounding
  - pre_archive_validation_failed
  - post_archive_validation_failed
