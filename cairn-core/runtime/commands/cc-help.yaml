command: cc-help
summary: List every migrated cc-* command with its function and invocation signature, drawn from runtime manifests rather than prose docs.

category: harness
roles:
  - harness-guide
outputs:
  - command_catalog_result
validates:
  - command_registry_consistency
inputs:
  required: []

state:
  change_from:
    - none
  change_to: unchanged

writes: []

forbids:
  - write_any_files
  - change_change_state
  - perform_command_besides_listing
  - read_business_code

required_reads: []

optional_reads:
  - .claude/CLAUDE.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - enumerate_commands_from_core_runtime_commands
  - keep_manifest_summary_as_authoritative_source

steps:
  - read_core_runtime_commands_for_command_list
  - read_each_command_manifest_summary_and_required_inputs
  - render_commands_grouped_by_workflow_order_scenario
  - emit_command_catalog_result

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - core_yaml_runtime_commands
      - command_manifests_summary
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
  next_actions:
    - choose_a_command_to_run

anti_rationalizations:
  - treat_doc_tables_as_authoritative_over_manifest_summary

red_flags:
  - output_mixes_in_non_cc_scripts
  - command_list_diverges_from_core_runtime_commands

stop_conditions:
  - core_runtime_commands_missing
