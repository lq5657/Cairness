version: 1
language: python
summary: Python technology decision catalog for project-level and change-level clarification.

decision_policy:
  applies_to_commands:
    - cc-new-project
    - cc-propose
    - cc-init
    - cc-enrich-context
  confirmation_required_levels:
    - P0
  default_behavior:
    - offer_recommendation_with_alternatives
    - explain_adoption_and_rejection_reasons
    - record_unresolved_choices_as_pending
    - never_write_recommendation_as_user_decision_without_confirmation

decision_groups:
  - id: runtime_shape
    level: P0
    scope: project
    applies_when:
      - new_project
      - runtime_shape_not_selected
    question: Select the Python runtime shape.
    default_recommendation: cli_or_library
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/context/dev-map.md
    options:
      - id: cli_or_library
        label: CLI or library
        recommended_when:
          - local_tooling_or_reusable_package
          - no_long_running_service_required
        tradeoffs:
          - Simple packaging and verification path for automation or reusable modules
          - HTTP lifecycle, background jobs, and deployment health checks must be added explicitly later
      - id: http_api
        label: HTTP API
        recommended_when:
          - external_or_browser_clients_call_service
          - request_response_contract_needed
        tradeoffs:
          - Clear integration boundary and familiar deployment model
          - Requires routing, request validation, error response, and runtime process conventions
      - id: worker
        label: Worker
        recommended_when:
          - primary_flow_is_async_processing
          - queue_or_batch_jobs_are_core
        tradeoffs:
          - Fits scheduled jobs, consumers, and data processing flows
          - Requires retry, idempotency, dead-letter, and observability decisions
      - id: data_app
        label: Data app
        recommended_when:
          - notebooks_or_pipelines_drive_value
          - data_transformation_is_primary
        tradeoffs:
          - Matches analytics, ETL, and ML-oriented workflows
          - Needs stricter decisions for reproducibility, data contracts, and environment isolation

  - id: packaging_tool
    level: P0
    scope: project
    applies_when:
      - new_python_project
      - dependency_entrypoint_not_selected
    question: Select the Python packaging and dependency entrypoint.
    default_recommendation: pyproject_uv
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/context/dev-map.md
    options:
      - id: pyproject_uv
        label: pyproject.toml + uv
        recommended_when:
          - fast_reproducible_local_workflows
          - modern_python_packaging_preferred
        tradeoffs:
          - Fast dependency resolution and a standard project metadata entrypoint
          - Team and CI images must have uv installed or explicitly bootstrap it
      - id: poetry
        label: Poetry
        recommended_when:
          - team_already_uses_poetry
          - package_publishing_is_expected
        tradeoffs:
          - Mature dependency and packaging workflow with lockfile support
          - Adds Poetry-specific commands and environment management conventions
      - id: setuptools_pip
        label: setuptools + pip
        recommended_when:
          - existing_project_uses_setup_files
          - minimal_tooling_change_required
        tradeoffs:
          - Broad compatibility with legacy Python projects and CI images
          - Reproducibility depends on explicit lock or constraints files
      - id: requirements_only
        label: requirements.txt only
        recommended_when:
          - small_application_not_packaged
          - deployment_platform_installs_requirements_directly
        tradeoffs:
          - Very simple adoption path
          - Weak package metadata and harder dependency grouping

  - id: web_framework
    level: P0
    scope: both
    applies_when:
      - http_api_selected
      - web_framework_not_selected
    question: Select the Python HTTP framework.
    default_recommendation: fastapi
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: fastapi
        label: FastAPI
        recommended_when:
          - typed_request_response_models_are_useful
          - async_or_openapi_contract_needed
        tradeoffs:
          - Strong fit for typed APIs and generated OpenAPI documentation
          - Requires decisions for validation model ownership and async boundary discipline
      - id: flask
        label: Flask
        recommended_when:
          - small_service_or_existing_flask_codebase
          - minimal_framework_surface_preferred
        tradeoffs:
          - Lightweight and familiar
          - Larger systems need explicit conventions for validation, dependency injection, and response shape
      - id: django
        label: Django
        recommended_when:
          - admin_database_and_full_stack_patterns_are_needed
          - product_crud_surface_is_large
        tradeoffs:
          - Batteries-included stack for ORM, admin, auth, and migrations
          - Heavier framework boundary and stronger project layout assumptions
      - id: no_web_framework
        label: No web framework
        recommended_when:
          - python_is_library_or_worker
          - http_boundary_not_required
        tradeoffs:
          - Avoids unnecessary service dependencies
          - HTTP integration must be revisited if API requirements appear

  - id: test_runner
    level: P0
    scope: both
    applies_when:
      - python_tests_required
      - test_runner_not_selected
    question: Select the Python test runner.
    default_recommendation: pytest
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: pytest
        label: pytest
        recommended_when:
          - team_wants_rich_fixtures
          - broad_plugin_ecosystem_is_useful
        tradeoffs:
          - Strong default for application and library tests
          - Adds pytest dependency and plugin version decisions
      - id: unittest
        label: unittest
        recommended_when:
          - standard_library_only_is_required
          - dependency_footprint_must_be_minimal
        tradeoffs:
          - No external dependency and works in constrained environments
          - Less ergonomic fixtures and parametrization than pytest
      - id: integration_first
        label: Integration-first pytest
        recommended_when:
          - external_contracts_or_data_flows_dominate
          - unit_boundaries_are_thin
        tradeoffs:
          - Better evidence for end-to-end behavior
          - Slower feedback unless test data and service doubles are managed carefully

  - id: static_quality
    level: P0
    scope: both
    applies_when:
      - python_quality_gate_required
      - static_quality_not_selected
    question: Select the Python static quality gate.
    default_recommendation: ruff_plus_compileall
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: ruff_plus_compileall
        label: ruff + compileall
        recommended_when:
          - fast_lint_and_syntax_gate_needed
          - team_wants_low_ci_overhead
        tradeoffs:
          - Fast linting and syntax validation with small operational overhead
          - Type correctness still needs a separate mypy or pyright decision
      - id: mypy
        label: mypy
        recommended_when:
          - type_annotations_are_project_standard
          - domain_logic_benefits_from_static_types
        tradeoffs:
          - Catches important interface drift in typed code
          - Requires sustained annotation discipline and dependency stub management
      - id: pyright
        label: pyright
        recommended_when:
          - strict_type_feedback_is_required
          - editor_type_workflow_already_uses_pyright
        tradeoffs:
          - Fast and strict type analysis
          - Adds Node-based tooling unless provided by the platform
      - id: compileall_only
        label: compileall only
        recommended_when:
          - minimal_bootstrap_before_lint_policy
          - legacy_code_has_large_lint_debt
        tradeoffs:
          - Validates syntax with no external dependency
          - Does not enforce style, imports, typing, or common bug patterns

  - id: logging
    level: P1
    scope: project
    applies_when:
      - python_project
      - logging_not_selected
    question: Select the Python logging library.
    default_recommendation: loguru
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/context/project-context.md
    options:
      - id: loguru
        label: loguru
        recommended_when:
          - modern_python_logging_needed
          - ergonomic_api_preferred
        tradeoffs:
          - Zero-boilerplate setup with structured logging, rotation, and serialization built-in
          - Adds an external dependency; not available in standard library
      - id: stdlib_logging
        label: logging (stdlib)
        recommended_when:
          - standard_library_only_is_required
          - dependency_footprint_must_be_minimal
        tradeoffs:
          - No external dependency and available everywhere
          - Requires explicit configuration for handlers, formatters, and structured output
      - id: structlog
        label: structlog
        recommended_when:
          - structured_logging_is_primary_requirement
          - observability_pipeline_already_uses_key_value_logs
        tradeoffs:
          - Excellent structured logging with renderer flexibility
          - Steeper adoption curve and additional configuration compared to loguru

  - id: async_mode
    level: P0
    scope: project
    applies_when:
      - new_project
    question: Select the async execution model.
    default_recommendation: asyncio
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: asyncio
        label: asyncio (async/await)
        recommended_when:
          - io_bound_service_with_concurrent_requests
          - use_fastapi_or_modern_async_libs
        tradeoffs:
          - High concurrency I/O performance with cooperative scheduling
          - Requires async-aware drivers (DB driver, HTTP client) throughout
      - id: sync
        label: Synchronous (threaded/multi-process)
        recommended_when:
          - cpu_bound_or_simple_service
          - use_flask_django_or_sync_only_libs
        tradeoffs:
          - Lower mental overhead, simpler debugging
          - Requires multi-process/thread scaling for high concurrency
      - id: hybrid
        label: Hybrid (sync + async mixed)
        recommended_when:
          - gradual_migration_to_async
          - mix_of_sync_and_async_dependencies
        tradeoffs:
          - Flexible but error-prone (blocking calls in async context)
          - Requires explicit sync-in-async boundary management

  - id: database
    level: P0
    scope: project
    applies_when:
      - new_project_needs_persistence
    question: Select the primary database.
    default_recommendation: postgresql
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: postgresql
        label: PostgreSQL
        recommended_when:
          - production_service_with_relational_data
          - need_jsonb_full_text_or_advanced_indexing
        tradeoffs:
          - Most capable open-source relational database
          - Operations overhead compared to SQLite
      - id: mysql
        label: MySQL / MariaDB
        recommended_when:
          - existing_mysql_infrastructure
          - team_mysql_experience
        tradeoffs:
          - Widely available with mature managed services
          - Some advanced features behind PostgreSQL
      - id: sqlite
        label: SQLite
        recommended_when:
          - prototype_or_local_dev
          - embedded_or_edge_deployment
        tradeoffs:
          - Zero configuration, file-level deployment
          - Not suitable for concurrent write-heavy workloads
      - id: none
        label: No database
        recommended_when:
          - stateless_service_or_external_data_source
        tradeoffs:
          - Simple, no persistence to manage
          - Adding later requires migration work

  - id: orm
    level: P0
    scope: project
    applies_when:
      - database_is_relational
    question: Select the ORM or data access layer.
    default_recommendation: sqlalchemy
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/dev-map.md
    options:
      - id: sqlalchemy
        label: SQLAlchemy 2.0
        recommended_when:
          - want_mature_orm_with_async_support
          - need_connection_pooling_and_raw_sql_escape_hatch
        tradeoffs:
          - Feature-complete, 2.0 adds native async support
          - Steeper learning curve than simpler ORMs
      - id: django_orm
        label: Django ORM
        recommended_when:
          - use_django_framework
        tradeoffs:
          - Deep integration with Django ecosystem
          - Not suitable outside Django projects
      - id: peewee
        label: Peewee
        recommended_when:
          - simple_crud_lightweight_needs
        tradeoffs:
          - Lightweight, low learning cost
          - Lacks async support and some advanced features
      - id: raw_sql
        label: Raw SQL (psycopg/asyncpg)
        recommended_when:
          - complex_queries_not_suited_for_orm
          - team_prefers_direct_sql_control
        tradeoffs:
          - Full SQL control
          - No migration or query builder out of the box

  - id: project_structure
    level: P0
    scope: project
    applies_when:
      - new_project
    question: Select the project directory structure.
    default_recommendation: simple_layered
    requires_user_confirmation: true
    outputs:
      - .cairness/context/dev-map.md
    options:
      - id: simple_layered
        label: Simple layered (router/service/repo)
        recommended_when:
          - small_to_medium_service
          - team_prefers_flat_structure
        tradeoffs:
          - Clear and easy to understand for new contributors
          - May need restructuring as project grows
      - id: modular
        label: Modular / domain-split
        recommended_when:
          - multiple_business_domains
          - want_clear_module_boundaries_for_parallel_work
        tradeoffs:
          - Good for parallel development and module independence
          - Requires early domain boundary design
      - id: django_app
        label: Django app structure
        recommended_when:
          - use_django_framework
        tradeoffs:
          - Follows Django conventions
          - Cross-app coupling requires active management

  - id: cache
    level: P1
    scope: project
    applies_when:
      - service_needs_caching
    question: Select the caching solution.
    default_recommendation: redis
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: redis
        label: Redis (redis-py)
        recommended_when:
          - production_distributed_cache
          - also_need_rate_limiting_or_queue
        tradeoffs:
          - High performance, versatile data structures
          - Requires separate service or managed instance
      - id: in_memory
        label: In-memory (cachetools / functools.lru_cache)
        recommended_when:
          - single_process_or_prototype
          - small_cache_size
        tradeoffs:
          - Zero dependencies, simple
          - Cache not shared across processes
      - id: none
        label: No cache
        recommended_when:
          - no_performance_concerns_yet
        tradeoffs:
          - Simple, can add later when needed

  - id: configuration
    level: P1
    scope: project
    applies_when:
      - new_project
    question: Select the configuration management approach.
    default_recommendation: pydantic_settings
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: pydantic_settings
        label: Pydantic Settings
        recommended_when:
          - use_fastapi_or_pydantic
          - want_type_safe_config_with_env_file_support
        tradeoffs:
          - Type-safe, supports .env files and secret directories
          - Adds Pydantic dependency if not already present
      - id: python_decouple
        label: python-decouple
        recommended_when:
          - simple_env_and_ini_config
          - lightweight_needs
        tradeoffs:
          - Lightweight and framework-agnostic
          - No type validation
      - id: stdlib_env
        label: os.environ / os.getenv
        recommended_when:
          - minimal_dependencies
          - simple_configuration_needs
        tradeoffs:
          - Zero dependencies, always available
          - No validation, manual type conversion

  - id: validation
    level: P1
    scope: project
    applies_when:
      - new_project_with_data_models
    question: Select the data validation approach.
    default_recommendation: pydantic_v2
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: pydantic_v2
        label: Pydantic v2
        recommended_when:
          - use_fastapi_or_want_runtime_type_validation
          - need_json_schema_generation
        tradeoffs:
          - Type-safe, fast (Rust core in v2), JSON Schema generation
          - Default dependency of FastAPI
      - id: attrs
        label: attrs / cattrs
        recommended_when:
          - want_lightweight_dataclass_alternative
          - need_unstructuring
        tradeoffs:
          - Lightweight and flexible
          - Smaller ecosystem than Pydantic
      - id: dataclasses
        label: stdlib dataclasses
        recommended_when:
          - minimal_dependencies_simple_models
        tradeoffs:
          - Standard library, zero dependencies
          - No runtime validation built in

  - id: dependency_injection
    level: P1
    scope: project
    applies_when:
      - new_project_with_moderate_complexity
    question: Select the dependency injection approach.
    default_recommendation: fastapi_depends
    requires_user_confirmation: false
    outputs:
      - .cairness/context/dev-map.md
    options:
      - id: fastapi_depends
        label: FastAPI Depends
        recommended_when:
          - use_fastapi
        tradeoffs:
          - Built-in, clean, composable
          - Only available in FastAPI request context
      - id: dependency_injector
        label: dependency-injector
        recommended_when:
          - complex_dependency_graph
          - non_fastapi_project
        tradeoffs:
          - Full-featured IoC container
          - Learning curve for teams unfamiliar with DI containers
      - id: manual
        label: Manual / constructor injection
        recommended_when:
          - simple_dependencies
          - prefer_framework_free_approach
        tradeoffs:
          - Simple and transparent
          - Maintenance cost grows with project complexity

  - id: async_task_queue
    level: P1
    scope: project
    applies_when:
      - need_background_or_async_task_processing
    question: Select the async task queue.
    default_recommendation: celery
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: celery
        label: Celery
        recommended_when:
          - production_task_queue_with_retries_and_scheduling
        tradeoffs:
          - Feature-complete (retries, scheduling, monitoring)
          - Requires broker (Redis/RabbitMQ) and worker process
      - id: arq
        label: ARQ
        recommended_when:
          - async_native_python_project
          - want_simple_redis_backed_queue
        tradeoffs:
          - Async native, simple API
          - Fewer features than Celery
      - id: background_tasks
        label: FastAPI BackgroundTasks
        recommended_when:
          - lightweight_in_process_tasks
          - no_need_for_persistence_or_retry
        tradeoffs:
          - Zero configuration, built into FastAPI
          - Tasks lost on process restart
      - id: none
        label: No task queue
        recommended_when:
          - no_background_processing_needed
        tradeoffs:
          - Simple, can add later

  - id: observability
    level: P1
    scope: project
    applies_when:
      - production_service
    question: Select the observability approach.
    default_recommendation: opentelemetry
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
    options:
      - id: opentelemetry
        label: OpenTelemetry
        recommended_when:
          - production_distributed_tracing
          - vendor_neutral_observability
        tradeoffs:
          - Industry-standard protocol, multi-backend support
          - Configuration and instrumentation overhead
      - id: prometheus
        label: Prometheus client
        recommended_when:
          - metrics_only_needs
          - existing_prometheus_stack
        tradeoffs:
          - Focused on metrics, well-understood
          - Need separate solution for tracing and structured logging
      - id: custom
        label: Custom / log-based
        recommended_when:
          - small_service_or_prototype
        tradeoffs:
          - Zero additional dependencies
          - Will need upgrade as service scales
