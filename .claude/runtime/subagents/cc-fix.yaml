command: cc-fix
merge_owner: main_flow
final_writes_by: main_flow
write_scope_policy: parent_writes_subset
parallel_policy: disjoint_writes_only
agents:
  - name: root-cause-reviewer
    role: reviewer
    mode: read_only
    trigger: confirm_finding_still_applies
    writes: []
    output: root_cause_and_minimal_fix_hypothesis
    output_contract:
      format: structured_subagent_result
      required_fields:
        - summary
        - scope
        - writes
        - evidence
        - risks
        - merge_notes
      evidence_quality:
        min_evidence_items: 1
        min_risk_items: 1
        require_concrete_references: true
        allow_freeform: false
  - name: fix-worker
    role: developer
    mode: scoped_write
    trigger: implement_selected_finding_fix
    writes:
      - finding_related_code_files
    output: scoped_patch_summary
    output_contract:
      format: structured_subagent_result
      required_fields:
        - summary
        - scope
        - writes
        - evidence
        - risks
        - merge_notes
      evidence_quality:
        min_evidence_items: 1
        min_risk_items: 1
        require_concrete_references: true
        allow_freeform: false
  - name: test-verifier
    role: test-verifier
    mode: scoped_write
    trigger: verify_fixed_finding
    writes:
      - test_files
    output: fix_verification_evidence
    output_contract:
      format: structured_subagent_result
      required_fields:
        - summary
        - scope
        - writes
        - evidence
        - risks
        - merge_notes
      evidence_quality:
        min_evidence_items: 1
        min_risk_items: 1
        require_concrete_references: true
        allow_freeform: false
merge_requirements:
  - main_flow_updates_finding_status
  - main_flow_records_symptom_failure_point_root_cause_and_fix_guard
  - subagents_may_parallelize_only_disjoint_finding_write_scopes
  - fixed_requires_fresh_verification
  - unrecorded_scope_requires_return_to_propose_or_review
