# Golang Harness runtime policy.
# Relative paths are interpreted from `.claude/`.

git:
  auto_commit: true
  commit_per_task: true
  allow_main_branch_apply: false
  require_clean_worktree_before_commit: true

validation:
  auto_run: true
  fail_on_error: true
  verify_command: ".claude/scripts/cc-verify"
  delta_command: ".claude/scripts/cc-delta-check"
  baseline_dir: "changes/<change-id>/baseline"
  require_structured_hard_gate: true
  require_traceability_check: true
  go:
    test: true
    vet: true
    golangci_lint: false
  run_on:
    propose:
      - cc-verify --harness-only
    apply:
      - cc-verify
    fix:
      - cc-verify
    test:
      - cc-verify
    review:
      - cc-verify --harness-only
    archive:
      - cc-verify
