# cc_spec Harness runtime policy.
# Relative paths are interpreted from the project root.

profile: standard

paths:
  framework_root: ".claude"
  state_root: ".cairness"
  framework_docs_root: ".claude/docs"

git:
  auto_commit: true
  commit_per_task: true
  allow_main_branch_apply: false
  require_clean_worktree_before_commit: true
  pre_commit_orphan_check: true
  orphan_policy: warn

workflow:
  definition: ".claude/workflows/cc-workflow.yaml"

runtime:
  core: ".claude/runtime/core.yaml"
  core_schema: ".claude/schemas/runtime-core.schema.json"
  command_dir: ".claude/runtime/commands"
  command_schema: ".claude/schemas/runtime-command.schema.json"
  readset_dir: ".claude/runtime/readsets"
  readset_schema: ".claude/schemas/runtime-readset.schema.json"
  topic_rule_schema: ".claude/schemas/topic-rule.schema.json"
memory:
  project_summary: ".cairness/context/project-summary.md"
  project_context: ".cairness/context/project-context.md"
  domain_language: ".cairness/context/domain-language.md"
  dev_map: ".cairness/context/dev-map.md"
  task_board: ".cairness/changes/task-board.md"
  policy: ".claude/rules/memory-policy.md"

docs:
  examples_dir: ".claude/docs/examples"
  adoption_dir: ".claude/docs/adoption"
  maintenance_dir: ".claude/docs/maintenance"

interaction:
  confirmation_tiers:
    tier1:
      description: "始终要求用户显式确认的阻塞点"
      blocks:
        - hard_gate_confirm
        - finding_accepted
        - archive_done
    tier2:
      description: "可批量确认或自动降级的决策点"
      blocks:
        - technology_selection
        - task_split
        - knowledge_compounding
      auto_accept_after_consecutive_defaults: 3
      on_auto_accept: "降级为通知，告知用户已自动接受默认值"
  fatigue_detection:
    enabled: true
    reset_on_new: "当同类问题出现新选项或参数变化时重置计数器"

budgets:
  token:
    warn_ratio: 0.7
    block_ratio: 0.95
    limits:
      propose: 50000
      apply: 200000
      review: 150000
      fix: 100000
      test: 100000
      archive: 30000
      inspect: 150000
      explain: 100000
      init: 30000
      enrich: 30000
      discuss: 120000
  duration:
    warn_seconds: 300
    block_seconds: 600
  auto_check:
    enabled: true
    min_events_for_baseline: 5

gate_effectiveness:
  degradation_window: 20
  degradation_threshold: 0.0
  min_samples_before_judge: 10
  auto_check_on_archive: true

dependencies:
  auto_check_on_propose: true
  auto_check_on_apply: true
  conflict_detection: strict
  circular_dependency: block
  max_parallel_changes: 5

validation:
  auto_run: true
  fail_on_error: true
  verify_command: ".claude/scripts/cc-verify"
  delta_command: ".claude/scripts/cc-delta-check"
  schema_command: ".claude/scripts/cc-schema-check"
  role_command: ".claude/scripts/cc-role-check"
  eval_command: ".claude/scripts/cc-eval"
  readset_command: ".claude/scripts/cc-readset"
  deps_command: ".claude/scripts/cc-deps"
  gate_stats_command: ".claude/scripts/cc-gate-stats"
  baseline_dir: ".cairness/changes/<change-id>/baseline"
  fixture_dir: ".claude/fixtures"
  require_structured_hard_gate: true
  require_traceability_check: true
  verification:
    capabilities:
      unit: true
      static: true
      lint: false
  go:
    test: true
    vet: true
    golangci_lint: false
  run_on:
    discuss:
      - cc-verify --harness-only
    propose:
      - cc-verify --harness-only
    apply:
      - cc-verify
      - cc-budget-check
    fix:
      - cc-verify
      - cc-budget-check
    test:
      - cc-verify
    review:
      - cc-verify --harness-only
      - cc-budget-check
    archive:
      - cc-verify
