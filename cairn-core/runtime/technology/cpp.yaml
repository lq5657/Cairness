version: 1
language: cpp
summary: C++ technology decision catalog for project-level and change-level clarification.

decision_policy:
  applies_to_commands:
    - cc-new-project
    - cc-propose
    - cc-init
    - cc-enrich-context
  confirmation_required_levels:
    - P0
  default_behavior:
    - offer_recommendation_with_alternatives
    - explain_adoption_and_rejection_reasons
    - record_unresolved_choices_as_pending
    - never_write_recommendation_as_user_decision_without_confirmation

decision_groups:
  - id: runtime_shape
    level: P0
    scope: project
    applies_when:
      - new_project
      - runtime_shape_not_selected
    question: Select the C++ runtime shape.
    default_recommendation: library_or_cli
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/context/dev-map.md
    options:
      - id: library_or_cli
        label: Library or CLI
        recommended_when:
          - local_tool_or_reusable_native_component
          - deployment_surface_should_stay_small
        tradeoffs:
          - Simple runtime boundary and low service-operation overhead
          - API, process lifecycle, and packaging conventions must be added when integration expands
      - id: long_running_service
        label: Long-running service
        recommended_when:
          - native_performance_required_for_online_requests
          - process_lifecycle_and_observability_are_known
        tradeoffs:
          - Good fit for latency-sensitive native services
          - Requires explicit decisions for config, signal handling, health checks, and deployment safety
      - id: worker
        label: Worker
        recommended_when:
          - compute_or_io_pipeline_is_async
          - queue_or_batch_boundary_is_primary
        tradeoffs:
          - Fits consumers, batch processors, and native compute pipelines
          - Requires decisions for idempotency, retries, checkpoints, and failure recovery
      - id: embedded_component
        label: Embedded component
        recommended_when:
          - code_runs_inside_host_process
          - abi_or_platform_constraints_dominate
        tradeoffs:
          - Keeps native code close to host integration needs
          - Requires strict ABI, toolchain, and platform compatibility governance

  - id: build_system
    level: P0
    scope: project
    applies_when:
      - new_cpp_project
      - build_entrypoint_not_selected
    question: Select the C++ build system.
    default_recommendation: cmake
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/context/dev-map.md
    options:
      - id: cmake
        label: CMake
        recommended_when:
          - cross_platform_builds_are_needed
          - broad_tooling_compatibility_is_important
        tradeoffs:
          - Widely supported by IDEs, CI images, package managers, and native toolchains
          - Project quality depends on disciplined target modeling and preset conventions
      - id: makefile
        label: Makefile
        recommended_when:
          - small_project_or_fixture
          - simple_unix_like_build_is_enough
        tradeoffs:
          - Transparent and easy to inspect for small native projects
          - Cross-platform dependency modeling and larger target graphs become hard to maintain
      - id: meson
        label: Meson
        recommended_when:
          - fast_incremental_builds_are_important
          - team_accepts_meson_ninja_tooling
        tradeoffs:
          - Clean build definitions and strong speed profile
          - Smaller ecosystem than CMake in some enterprise and embedded environments
      - id: bazel
        label: Bazel
        recommended_when:
          - monorepo_or_remote_cache_required
          - hermetic_builds_are_a_goal
        tradeoffs:
          - Strong reproducibility and cache behavior for large codebases
          - Higher onboarding and rule maintenance cost

  - id: dependency_management
    level: P0
    scope: both
    applies_when:
      - external_native_dependencies_required
      - dependency_management_not_selected
    question: Select the C++ dependency management approach.
    default_recommendation: vcpkg_or_conan
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/architecture-outline.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: vcpkg_or_conan
        label: vcpkg or Conan
        recommended_when:
          - third_party_native_libraries_are_expected
          - reproducible_dependency_resolution_is_needed
        tradeoffs:
          - Provides a managed dependency entrypoint and lock-oriented workflows
          - Requires choosing one ecosystem and documenting binary cache or build-from-source policy
      - id: system_packages
        label: System packages
        recommended_when:
          - platform_image_controls_dependencies
          - dependency_set_is_small_and_stable
        tradeoffs:
          - Simple runtime images when OS packages are centrally managed
          - Version drift across developer machines and CI must be controlled explicitly
      - id: vendored_sources
        label: Vendored sources
        recommended_when:
          - supply_chain_or_air_gap_constraints_apply
          - dependency_count_is_low
        tradeoffs:
          - High control over reviewed dependency source
          - Increases repository size and manual update responsibility
      - id: no_external_dependencies
        label: No external dependencies
        recommended_when:
          - standard_library_is_sufficient
          - bootstrap_speed_is_more_important_than_ecosystem_reuse
        tradeoffs:
          - Minimal supply-chain and build complexity
          - More custom implementation may be needed if requirements expand

  - id: test_framework
    level: P0
    scope: both
    applies_when:
      - cpp_tests_required
      - test_framework_not_selected
    question: Select the C++ test framework.
    default_recommendation: googletest
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: googletest
        label: GoogleTest
        recommended_when:
          - team_wants_common_cpp_testing_standard
          - ci_reporting_and_fixtures_are_needed
        tradeoffs:
          - Mature, widely understood, and integrates well with CMake and CI
          - Adds dependency and target wiring overhead
      - id: catch2
        label: Catch2
        recommended_when:
          - lightweight_test_binary_preferred
          - readable_test_cases_are_important
        tradeoffs:
          - Good ergonomics with lighter project setup
          - Ecosystem conventions may differ from enterprise GoogleTest defaults
      - id: doctest
        label: doctest
        recommended_when:
          - very_fast_header_only_tests_are_desired
          - small_library_needs_low_friction_tests
        tradeoffs:
          - Minimal setup and fast compile profile
          - Less standard in some large C++ organizations
      - id: custom_main
        label: Custom test main
        recommended_when:
          - fixture_or_tiny_project
          - no_test_dependency_allowed
        tradeoffs:
          - No external test framework dependency
          - Reporting, fixtures, parametrization, and failure diagnostics stay minimal

  - id: language_standard
    level: P0
    scope: both
    applies_when:
      - cpp_standard_not_selected
      - compiler_compatibility_affects_scope
    question: Select the C++ language standard baseline.
    default_recommendation: cpp20
    requires_user_confirmation: true
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: cpp17
        label: C++17
        recommended_when:
          - older_compiler_compatibility_required
          - dependency_ecosystem_targets_cpp17
        tradeoffs:
          - Conservative baseline for broad compiler and platform support
          - Misses newer standard library and language features that reduce custom code
      - id: cpp20
        label: C++20
        recommended_when:
          - modern_compilers_are_available
          - stronger_language_features_reduce_complexity
        tradeoffs:
          - Good modern default for new native projects
          - Requires confirming compiler versions in CI and deployment images
      - id: cpp23
        label: C++23
        recommended_when:
          - toolchain_is_current_and_controlled
          - project_benefits_from_latest_standard_features
        tradeoffs:
          - Access to newer language and library features
          - Higher compatibility risk across compilers, platforms, and dependencies

  - id: logging
    level: P1
    scope: both
    applies_when:
      - production_native_code
      - logging_not_selected
    question: Select the C++ logging library.
    default_recommendation: spdlog
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: spdlog
        label: spdlog
        recommended_when:
          - modern_cpp_logging_needed
          - header_only_or_compiled_acceptable
        tradeoffs:
          - Fast, fmt-based formatting, multiple sinks, header-only option
          - Requires C++11 or later, async logging needs thread pool management
      - id: glog
        label: glog (Google Log)
        recommended_when:
          - existing_glog_integration
          - google_ecosystem_alignment
        tradeoffs:
          - Mature, well-known in Google ecosystem, conditional logging levels
          - Less modern API than spdlog, fewer sink options
      - id: boost_log
        label: Boost.Log
        recommended_when:
          - boost_already_in_dependency_tree
          - highly_customizable_logging_needed
        tradeoffs:
          - Extremely flexible, good for complex logging architectures
          - Heavy compile times, complex configuration, Boost dependency
      - id: std_cerr
        label: std::cerr / printf
        recommended_when:
          - library_or_minimal_logging
          - no_logging_library_dependency_desired
        tradeoffs:
          - Zero dependency, works everywhere
          - No structured logging, levels, rotation, or async support

  - id: static_analysis
    level: P1
    scope: project
    applies_when:
      - production_or_safety_critical_code
      - static_analysis_not_selected
    question: Select the C++ static analysis tooling.
    default_recommendation: clang_tidy
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-context.md
    options:
      - id: clang_tidy
        label: clang-tidy
        recommended_when:
          - cmake_or_clang_based_project
          - modern_cpp_checks_are_valued
        tradeoffs:
          - Broad check coverage, integrates with CMake, auto-fix for many issues
          - Requires compilation database, check configuration needs curation
      - id: clang_tidy_cppcheck
        label: clang-tidy + Cppcheck
        recommended_when:
          - broadest_static_coverage_needed
          - safety_or_security_critical
        tradeoffs:
          - Complementary — clang-tidy for style/modernization, Cppcheck for flow-based bugs
          - Two tools to configure and maintain in CI
      - id: compiler_warnings
        label: Compiler warnings only (-Wall -Wextra -Werror)
        recommended_when:
          - smaller_project_or_library
          - minimal_tooling_setup
        tradeoffs:
          - Zero additional dependency, always available
          - Much narrower scope than dedicated static analyzers
      - id: sonarqube
        label: SonarQube / Coverity
        recommended_when:
          - enterprise_sast_requirements
          - compliance_or_certification_needed
        tradeoffs:
          - Deep analysis, trend tracking, compliance reporting
          - Commercial tooling, server infrastructure, slower feedback cycle

  - id: http_library
    level: P2
    scope: both
    applies_when:
      - service_or_client_needs_http
      - http_library_not_selected
    question: Select the C++ HTTP library.
    default_recommendation: cpp_httplib
    requires_user_confirmation: false
    outputs:
      - .cairness/context/project-definition.md
      - .cairness/changes/<change-id>/spec.md
    options:
      - id: cpp_httplib
        label: cpp-httplib
        recommended_when:
          - simple_http_server_or_client
          - header_only_is_preferred
        tradeoffs:
          - Single header, easy to integrate, supports HTTPS via OpenSSL
          - Limited to HTTP/1.1, not suitable for high-throughput services
      - id: boost_beast
        label: Boost.Beast
        recommended_when:
          - boost_already_in_tree
          - low_level_http_control_needed
        tradeoffs:
          - Builds on Boost.Asio, HTTP/1.1 and WebSocket support
          - Low-level API, requires more boilerplate than httplib
      - id: drogon
        label: Drogon
        recommended_when:
          - full_web_framework_needed
          - async_high_performance_http
        tradeoffs:
          - Fast C++17 coroutine-based framework, built-in ORM and WebSocket
          - Heavier than library-level solutions, framework lock-in
      - id: no_http
        label: No HTTP
        recommended_when:
          - library_or_cli
          - http_is_not_in_scope
        tradeoffs:
          - No networking dependency
          - HTTP capability must be added later if requirements change
