id: debugging_workflow
description: "修复 Finding、缺陷、失败测试或不明原因行为时的调试流程"

trigger:
  - "cc-fix 处理 open Finding 或用户提供的修复描述"
  - "测试、验证命令、review Finding 或运行时症状失败且根因未被证明"
  - "提议的修复依赖于区分症状、失败点和根因"

skip:
  - "不得用本规则扩大当前 Finding 或 task 之外的范围"
  - "当最小修复可解决已证明的根因时，不得用本规则为投机性重写辩护"
  - "当问题纯粹是文档性的且证据已充分时，不要求完整复现，但需记录原因"

process:
  - "在提出补丁前构建最小有用反馈环：失败测试、验证命令、curl/CLI 复现、fixture、日志回放或文档化替代证据"
  - "通过反馈环复现或确认问题仍然存在"
  - "用最小有用的代码/配置/测试切片定位失败点"
  - "区分症状、失败点、根因和影响范围"
  - "根因不明显时列出可证伪假设；每次测试一个变量，有用时记录被否定的假设"
  - "需要时窄范围插桩，使用易于移除的临时标记"
  - "定义最小修复假设并显式拒绝更大范围重写"
  - "实现最小范围修复"
  - "添加或识别防护：回归测试、断言、验证命令或文档化手工证据"
  - "最终验证前移除临时插桩和调试产物"
  - "重新运行 fresh verification，仅在证据通过后更新 Finding 状态"

anti_rationalization:
  - claim: "审查者已经给出了原因"
    reality: "审查者文本可能描述的是症状而非根因；需重新检查代码并记录症状/失败点/根因"
  - claim: "这个修复应该能行"
    reality: "合理的修复不是证据；必须运行或记录 fresh verification"
  - claim: "反馈环开销太大"
    reality: "没有反馈信号，修复可能针对错误的失败；构建最小环或记录替代证据和剩余风险"
  - claim: "我通过阅读就能推断原因"
    reality: "阅读可以识别候选项，但不能证明行为；记录反馈信号或复现不可能的具体原因"
  - claim: "我发现了更大的清理机会"
    reality: "清理可能隐藏最小修复并扩大审查范围；将无关清理推迟到新 change"
  - claim: "这个问题可能已经过时了"
    reality: "过时的 Finding 仍需要可审计的结论；确认过时状态并仅在有理由时标记 accepted/fixed"

red_flags:
  - "修复在 Finding 被确认或显式声明过时之前就开始"
  - "补丁前没有记录反馈环、替代证据或显式复现阻塞"
  - "根因从审查者措辞复制而无代码证据"
  - "临时插桩留在最终代码或提交产物中"
  - "补丁修改了 Finding 相关范围之外的文件"
  - "Finding 被标记为 fixed 但没有防护或 fresh verification 证据"
  - "验证失败被当作无关处理而没有 delta 或失败分析"

checks:
  - "log.md 或 review.md 记录了反馈环、复现/确认证据、根因、最小修复假设、变更文件、防护和 fresh verification 结果"
  - "若复现不可能，记录原因、替代证据和剩余风险"
  - "临时插桩和一次性调试产物已移除或显式排除在最终写入之外"

rules:
  调试记录模板: |
    #### Debug Record — <finding-id>

    | 项目 | 证据 |
    |------|------|
    | 反馈环 | 测试、命令、fixture、日志回放、手工复现或替代证据 |
    | 症状 | 失败内容或审查者观察到的现象 |
    | 失败点 | 发生失败的文件/函数/条件 |
    | 已检查假设 | 测试过的候选原因或为何单一直接原因已足够 |
    | 根因 | 已证明的原因，不只是症状措辞 |
    | 最小修复假设 | 预期修复问题的最小变更 |
    | 防护 | 回归测试、断言、命令或手工证据 |
    | 调试清理 | 临时插桩已移除 / 未引入 |
    | Fresh verification | 命令/结果或文档化阻塞 |
    | 剩余风险 | 无 / 已记录风险 |

relevance:
  category: change_type
  triggers:
    - when_reproduction_or_failure_localization_is_required
    - when_recovery_requires_debugging_a_failure
