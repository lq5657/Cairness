language_profile:
  default: golang
  schema: .claude/schemas/language-profile.schema.json
  resolution:
    order:
      - project_state
      - repository_detection
      - user_confirmation
      - default_if_single_profile
    project_state_paths:
      - .cairness/context/project-definition.md
      - .cairness/context/project-summary.md
      - .cairness/context/project-context.md
    new_project_requires_confirmation: true
    ambiguous_error: user_confirmation_required
    unsupported_error: unsupported_command
    selection_outputs:
      - .cairness/context/project-definition.md
      - .cairness/context/project-summary.md
      - .cairness/context/project-context.md
  profiles:
    cpp: .claude/runtime/languages/cpp.yaml
    golang: .claude/runtime/languages/golang.yaml
    java: .claude/runtime/languages/java.yaml
    python: .claude/runtime/languages/python.yaml
    typescript: .claude/runtime/languages/typescript.yaml
