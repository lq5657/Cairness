name: harness

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create framework symlink
        run: ln -s cairn-core .claude
      - name: Create state skeleton
        run: |
          mkdir -p .cairness/{context,changes,audits,knowledge,discussions}
          touch .cairness/context/project-summary.md
          touch .cairness/context/project-context.md
          touch .cairness/context/domain-language.md
          touch .cairness/context/dev-map.md
          touch .cairness/changes/task-board.md
          touch .cairness/knowledge/index.md
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Verify Harness
        run: .claude/scripts/cc-verify --harness-only --verbose
      - name: Validate Evals
        run: .claude/scripts/cc-eval .claude/evals
      - name: Verify Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/go-http-user-service --verbose
      - name: Verify Python Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/python-cli-package --verbose
      - name: Verify C++ Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/cpp-library --verbose
      - name: Verify Java Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/java-tooling-service --verbose
