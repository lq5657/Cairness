version: 1
command: cc-propose
source_manifest: .claude/runtime/commands/cc-propose.yaml
generated_from:
- .claude/runtime/core.yaml
- .claude/runtime/commands/cc-propose.yaml
always_reads:
- .claude/runtime/core.yaml
- .claude/runtime/commands/cc-propose.yaml
- .claude/context/project-context.md
- .claude/context/dev-map.md
- .claude/changes/task-board.md
- .claude/rules/verification.md
- .claude/rules/change-sizing.md
optional_reads: []
conditional_reads:
  when_validation_boundary_is_unclear:
