id: cc-wave-plan-overlap
description: |
  cc-wave-plan enforces the same-wave write-overlap gate: two parallel tasks
  (no depends_on) placed in the same wave whose file ranges intersect must
  fail (exit 1) with E_WAVE002.
command:
  - bash
  - -c
  - |
    set +e
    CHANGE_ID="chg-overlap-$$"
    CHANGE_DIR="$PWD/.cairness/changes/$CHANGE_ID"
    trap 'rm -rf "$CHANGE_DIR" || true' EXIT
    mkdir -p "$CHANGE_DIR"
    cat > "$CHANGE_DIR/tasks.md" <<'TASKS'
    ---
    change_id: chg-overlap
    task_graph:
      version: 1
      tasks:
        - id: T1
          depends_on: []
          parallel_safe: true
          files: [a.go]
        - id: T2
          depends_on: []
          parallel_safe: true
          files: [a.go]
    ---
    #### Task 1: A
    * **涉及文件**: a.go
    #### Task 2: B
    * **涉及文件**: a.go
    TASKS
    "$CAIRNESS_FRAMEWORK_ROOT/scripts/cc-wave-plan" --change "$CHANGE_ID" --json
    code=$?
    exit $code
expect_exit_code: 1
expect_output_contains:
  - "E_WAVE002"
