command: cc-enrich-context
summary: Enrich the project fact layer with evidence-backed context while avoiding audit findings or change creation.

category: context
roles:
  - pm-orchestrator
  - context-curator
outputs:
  - .cairness/context/project-context.md
  - .cairness/context/domain-language.md
  - .cairness/context/dev-map.md
validates:
  - base_context_exists
  - assumptions_confirmed
  - domain_language_terms_confirmed_or_pending
  - evidence_locations
  - confidence_level
  - memory_policy
  - blocking_assumption_user_confirmation
inputs:
  required: []

state:
  change_from:
    - none
  change_to: unchanged

writes:
  - .cairness/context/project-context.md
  - .cairness/context/domain-language.md
  - .cairness/context/dev-map.md

forbids:
  - finding_output
  - change_creation
  - audit_creation
  - assumptions_as_facts
  - auto_review_or_apply
  - treat_listed_assumptions_as_confirmed
  - write_unconfirmed_blocking_assumption_as_fact

required_reads:
  - .cairness/context/project-context.md
  - .cairness/context/domain-language.md
  - .cairness/context/dev-map.md
  - .claude/rules/memory-policy.md

optional_reads:
  - .cairness/context/project-summary.md

conditional_reads:
  when_writing_context_artifacts:
    - .claude/templates/context/project-context.md
    - .claude/templates/context/domain-language.md
    - .claude/templates/context/dev-map.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - claude_scaffold_exists
  - base_context_exists
  - confirm_goal_is_context_enrichment_not_audit_or_explanation
  - identify_thin_or_pending_context_areas_before_reading_code
  - keep_reads_targeted_to_fact_confirmation
  - distinguish_confirmed_facts_from_hypotheses

interaction_contract:
  mode: interactive_required
  clarification:
    when: blocking_assumptions_affect_fact_write_accuracy
    presentation:
      - show_candidate_assumptions_with_evidence_confidence_and_impact
      - ask_numbered_questions_for_only_blocking_assumptions
      - offer_confirm_correct_or_keep_pending_options
      - wait_for_user_answer_before_writing_confirmed_facts
    blocking_behavior:
      - do_not_write_unconfirmed_blocking_assumptions_as_facts
      - record_unanswered_assumptions_as_pending
      - next_action_must_be_answer_key_assumption_questions
    max_questions_per_round: 3
    resolution_required_before_ready: true

topic_rules:
  when_testing_facts_are_enriched:
    - .claude/runtime/topic-rules/testing-strategy.yaml
  when_configuration_facts_are_enriched:
    - .claude/runtime/topic-rules/configuration.yaml
  when_observability_facts_are_enriched:
    - .claude/runtime/topic-rules/observability.yaml
  when_security_or_auth_boundary_facts_are_enriched:
    - .claude/runtime/topic-rules/security.yaml
  when_external_or_version_sensitive_facts_are_claimed:
    - .claude/runtime/topic-rules/source-driven-development.yaml

anti_rationalizations:
  - treat_context_enrichment_as_codebase_audit
  - turn_known_fragility_into_findings_or_remediation_plan
  - infer_layering_from_directory_names_without_call_chain_evidence
  - write_blocking_assumption_as_fact_to_avoid_interrupting_flow
  - expand_read_scope_until_every_section_is_filled

red_flags:
  - output_contains_findings_or_severity_levels
  - project_context_contains_confirmed_claim_without_evidence_location
  - domain_language_records_implementation_terms_as_domain_terms
  - dev_map_records_hypothesis_as_stable_boundary
  - more_than_three_blocking_assumptions_asked_in_one_round
  - final_output_contains_pending_blocking_assumptions_without_direct_questions

steps:
  - verify_context_files_and_scaffold
  - read_existing_context_and_dev_map
  - identify_pending_or_thin_fact_areas
  - identify_domain_language_gaps_ambiguities_and_context_splits
  - select_high_value_fact_targets_before_reading_code
  - inspect_only_targeted_structure_entries_and_samples
  - separate_confirmed_facts_hypotheses_and_unknowns
  - ask_user_to_confirm_blocking_assumptions_when_needed
  - load_context_artifact_templates_before_writing
  - write_only_confirmed_or_explicitly_pending_facts
  - update_project_context_supplemental_fact_layer
  - update_domain_language_with_confirmed_terms_only
  - update_dev_map_navigation_and_confidence
  - stop_without_audit_change_explanation_or_implementation

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - written_artifacts
      - evidence_locations
      - recorded_unknowns
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - answer_assumption_questions_or_continue_context_use
    - proceed_to_inspect_propose_or_explain

stop_conditions:
  - missing_context_files
  - base_context_missing
  - requested_scope_is_audit_explanation_or_implementation
  - evidence_insufficient_for_confirmed_fact
  - blocking_assumption_requires_user_answer
  - memory_policy_violation
