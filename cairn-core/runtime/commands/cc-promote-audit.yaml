command: cc-promote-audit
summary: Bridge selected audit findings into a bounded change candidate without creating formal change docs.

category: audit_bridge
roles:
  - pm-orchestrator
  - requirement-analyst
  - backlog-curator
outputs:
  - .cairness/audits/<audit-id>/to-change.md
  - .cairness/changes/task-board.md
validates:
  - finding_selection
  - scope_reduction
  - split_boundary
  - verification_level_hint
  - task_board_not_spec
  - finding_selection_user_choice
inputs:
  required:
    - audit_id
    - change_id

state:
  change_from:
    - none
  change_to: unchanged

writes:
  - .cairness/audits/<audit-id>/to-change.md
  - .cairness/changes/task-board.md

forbids:
  - copy_entire_audit_verbatim
  - write_formal_change_spec_directly
  - merge_unrelated_findings
  - auto_enter_propose
  - treat_all_findings_as_selected_by_default
  - write_bridge_without_finding_selection_choice

required_reads:
  - .cairness/audits/<audit-id>/report.md
  - .cairness/changes/task-board.md

optional_reads:
  - .claude/runtime/commands/cc-propose.yaml

conditional_reads:
  when_writing_audit_bridge:
    - .claude/templates/audits/to-change.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - audit_report_exists
  - target_change_id_is_decided
  - clarify_this_is_bridge_scope_not_implementation
  - converge_findings_into_one_bounded_change_or_split

interaction_contract:
  mode: interactive_required
  selection:
    when: multiple_findings_or_scope_split_is_ambiguous
    presentation:
      - show_candidate_findings_and_split_options
      - ask_user_to_choose_findings_or_split_scope_when_ambiguous
      - wait_for_user_choice_before_writing_bridge_note
    confirmation_options:
      - promote_selected_findings
      - split_into_multiple_changes
      - block_until_scope_clarified
    required_confirmations:
      - selected_findings
      - target_change_scope
      - out_of_scope_findings
    blocking_behavior:
      - do_not_write_bridge_note_for_ambiguous_selection
      - next_action_must_be_choose_findings_or_split_scope

topic_rules:
  when_verification_level_hint_is_needed:
    - .claude/runtime/topic-rules/verification.yaml
  when_test_level_hint_is_needed:
    - .claude/runtime/topic-rules/testing-strategy.yaml

steps:
  - select_findings_for_this_change
  - present_finding_selection_or_split_options_and_wait_for_choice
  - define_in_scope_and_out_of_scope
  - map_findings_to_background_risks_and_tasks
  - propose_validation_level_hint
  - load_audit_bridge_template_before_writing
  - write_to_change_bridge_note
  - update_task_board_backlog_candidate

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - written_artifacts
      - bridge_note
      - task_board_update
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - interaction_state
  next_actions:
    - run_cc_propose_or_split_scope
    - choose_findings_or_split_scope

stop_conditions:
  - missing_required_argument
  - audit_report_missing
  - scope_not_converged
  - findings_should_be_split_but_are_still_mixed
  - finding_selection_choice_missing
