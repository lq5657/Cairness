command: cc-preflight
summary: Validate that a project has the Harness scaffold, routing, and deterministic checks needed before normal use.

category: harness
roles:
  - pm-orchestrator
  - gatekeeper
  - harness-maintainer
outputs:
  - structured_preflight_result
validates:
  - harness_structure
  - commands
  - checkpoints
  - schemas
  - scripts
  - harness_config
  - workflow_definition
  - dev_map
  - task_board
  - role_contracts
  - memory_policy
inputs:
  required: []

state:
  change_from:
    - none
  change_to: unchanged

writes: []

forbids:
  - scan_business_code_deeply
  - create_business_change
  - auto_fix_scaffold
  - expand_into_project_audit

required_reads:
  - .claude/harness.config.yaml
  - .claude/workflows/cc-workflow.yaml
  - .claude/runtime/checklists/preflight.yaml

optional_reads:
  - .claude/docs/adoption/integration-preflight-checklist.md
  - .cairness/context/dev-map.md
  - .cairness/changes/task-board.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - confirm_goal_is_preflight_not_project_inspection
  - keep_scope_on_harness_scaffold_and_entrypoints
  - prefer_checklist_items_over_freeform_extra_checks

steps:
  - read_compact_preflight_checklist
  - verify_scaffold_and_directory_layout
  - verify_runtime_workflow_scripts_and_schemas_exist
  - verify_path_resolution_and_command_entry_consistency
  - verify_minimum_command_chain_is_callable
  - emit_pass_block_or_needs_confirmation_result

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - checked_artifacts
      - adoption_checklist
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
  next_actions:
    - fix_scaffold_or_continue

stop_conditions:
  - missing_claude_scaffold
  - missing_key_templates_or_scripts
  - path_resolution_is_inconsistent
  - command_entry_is_unstable
