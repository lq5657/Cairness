command: cc-apply
summary: Implement one formal change task-by-task and promote the change to review only after evidence is fresh.

inputs:
  required:
    - change_id

state:
  change_from:
    - propose
    - apply
  change_to: review

writes:
  - task_declared_code_files
  - test_files
  - .claude/changes/<change-id>/spec.md
  - .claude/changes/<change-id>/tasks.md
  - .claude/changes/<change-id>/log.md
  - .claude/changes/<change-id>/test-spec.md
  - .claude/context/dev-map.md
  - .claude/changes/task-board.md

forbids:
  - out_of_scope_change
  - defer_minimum_verification_to_cc_test
  - mark_done_without_evidence
  - auto_push_or_merge
  - start_apply_with_stale_or_missing_hard_gate
  - treat_missing_hard_gate_as_user_confirmation

required_reads:
  - .claude/changes/<change-id>/spec.md
  - .claude/changes/<change-id>/tasks.md
  - .claude/context/dev-map.md
  - .claude/changes/task-board.md
  - .claude/harness.config.yaml

preconditions:
  - spec_and_tasks_exist
  - hard_gate_confirmed_for_current_revisions
  - depends_on_satisfied
  - branch_matches_change_and_is_not_main
  - save_pre_apply_baseline_before_first_code_edit
  - only_one_task_may_be_in_progress

interaction_contract:
  mode: interactive_required
  hard_gate:
    when: hard_gate_missing_stale_or_does_not_cover_current_revisions
    presentation:
      - show_missing_or_stale_hard_gate_fields
      - ask_user_to_return_to_confirm_revise_or_block_apply
      - wait_for_user_choice_before_code_edit
    confirmation_options:
      - return_to_cc_propose_confirm_scope
      - revise_spec_or_tasks
      - block_apply
    required_confirmations:
      - confirmed_spec_revision
      - confirmed_tasks_revision
      - confirmed_scope
      - accepted_risks
    blocking_behavior:
      - do_not_start_apply_until_hard_gate_current
      - next_action_must_be_resolve_hard_gate

topic_rules:
  always:
    - .claude/rules/verification.md
    - .claude/rules/coding-style.md
  when_task_touches_logic_bug_chain_or_data_access:
    - .claude/rules/testing-strategy.md
  when_task_touches_database:
    - .claude/rules/database-changes.md
  when_task_touches_external_contract:
    - .claude/rules/api-compatibility.md
  when_task_touches_configuration:
    - .claude/rules/configuration.md
  when_task_touches_observability:
    - .claude/rules/observability.md
  when_task_touches_release_or_rollback:
    - .claude/rules/release.md
  when_task_touches_security_boundary:
    - .claude/rules/security.md
  when_task_depends_on_external_or_version_sensitive_technology:
    - .claude/rules/source-driven-development.md
  when_change_has_dependency_or_parallelism_constraints:
    - .claude/rules/git-workflow.md

subagents:
  enabled: true
  policy: docs/maintenance/subagent-model.md
  merge_owner: main_flow
  final_writes_by: main_flow
  write_scope_policy: parent_writes_subset
  parallel_policy: disjoint_writes_only
  agents:
    - name: task-worker
      role: developer
      mode: scoped_write
      trigger: implement_selected_ready_task_or_disjoint_file_subset
      writes:
        - task_declared_code_files
      output: scoped_task_patch_summary
      output_contract:
        format: structured_subagent_result
        required_fields:
          - summary
          - scope
          - writes
          - evidence
          - risks
          - merge_notes
    - name: test-verifier
      role: test-verifier
      mode: scoped_write
      trigger: verify_selected_task
      writes:
        - test_files
      output: task_verification_evidence
      output_contract:
        format: structured_subagent_result
        required_fields:
          - summary
          - scope
          - writes
          - evidence
          - risks
          - merge_notes
    - name: context-curator
      role: context-curator
      mode: proposal_only
      trigger: module_boundary_or_verification_entry_changed
      writes: []
      output: dev_map_update_proposal
      output_contract:
        format: structured_subagent_result
        required_fields:
          - summary
          - scope
          - writes
          - evidence
          - risks
          - merge_notes
  merge_requirements:
    - main_flow_keeps_one_task_in_progress
    - main_flow_records_baseline_delta_and_task_evidence
    - subagents_may_parallelize_only_disjoint_file_subsets_within_selected_task

anti_rationalizations:
  - claim_small_change_without_minimum_verification
  - mark_task_done_before_fresh_evidence
  - defer_apply_minimum_verification_to_cc_test
  - let_subagent_output_bypass_main_flow_merge

red_flags:
  - dirty_worktree_contains_out_of_scope_files
  - task_write_scope_is_not_declared
  - validation_mapping_would_close_without_evidence
  - baseline_delta_contains_new_failure

steps:
  - verify_hard_gate_current_or_present_resolution_choices
  - mark_change_apply
  - select_one_ready_task
  - review_task_goal_scope_acceptance_and_verification
  - implement_only_declared_scope
  - sync_change_docs_and_governance_assets
  - run_post_task_validation
  - compare_baseline_delta
  - mark_task_done_only_with_fresh_evidence
  - repeat_until_all_tasks_closed
  - run_final_change_validation
  - promote_change_to_review

auto_validation:
  - .claude/scripts/cc-verify --json --output .claude/changes/<change-id>/baseline/pre-apply.json --change <change-id>
  - .claude/scripts/cc-delta-check --before <before-report> --after <after-report>
  - .claude/scripts/cc-verify --change <change-id>

result_contract:
  format: structured_command_result
  required_fields:
    - status
    - summary
    - writes
    - evidence
    - risks
    - next_action
  status_values:
    - passed
    - blocked
    - partial
  writes: manifest_writes
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - baseline_delta
      - task_evidence
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - run_cc_review_or_fix_validation
    - resolve_hard_gate_before_apply

stop_conditions:
  - missing_required_argument
  - hard_gate_not_confirmed
  - stale_hard_gate_for_current_revisions
  - user_choice_required_for_missing_hard_gate
  - baseline_capture_failed
  - minimum_verification_missing
  - delta_reports_new_failure
  - final_validation_failed
