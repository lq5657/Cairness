id: cc-verify-explicit-fixture
description: Explicit fixture paths must fail when they do not resolve to a Go module.
command:
  - .claude/scripts/cc-verify
  - --fixture
  - fixtures/go-http-user-service
  - --verbose
expect_exit_code: 1
expect_output_contains:
  - "explicit fixture fixtures/go-http-user-service is invalid"
  - "cause: The explicit fixture path does not resolve to a Go module."
  - "fix_hint: Use a fixture path containing go.mod"

