id: database_changes
description: "当变更涉及数据库 schema、migration、回填或兼容窗口时应用本规则"

trigger:
  - "变更涉及表、列、索引、约束、migration、DDL、回填或数据修复"
  - "代码依赖新 schema、双写/双读、灰度切换或兼容窗口"
  - "cc-review 需要判断数据库变更与 spec、task、实现是否一致"

skip:
  - "不涉及持久化 schema 或数据迁移的普通业务逻辑不加载本规则"
  - "不用它替代 API 兼容、发布或安全规则；这些风险应分别加载对应规则"
  - "不把'配置初始化数据'伪装成数据库迁移，除非会影响持久化数据"

process:
  - "将变更分类为 expand、migrate 或 contract"
  - "明确 migration 脚本、代码兼容策略、回填策略和回滚路径"
  - "拆分破坏性 schema、回填和业务切换，避免混在一个 task"
  - "在验证证据中记录兼容窗口、幂等性、失败恢复和旧版本影响"

anti_rationalization:
  - claim: "上线时手动改库即可。"
    reality: "手工 DDL 不可审查、不可回放、不可回滚。"
    response: "提供 migration 或等价可审查脚本。"
  - claim: "新增字段是可空的，所以不用说明。"
    reality: "可空字段仍可能影响读写、索引和旧版本行为。"
    response: "记录兼容性、默认语义和验证证据。"
  - claim: "回填只跑一次。"
    reality: "一次性脚本失败后仍需要重跑和恢复策略。"
    response: "说明批次、幂等性、停止条件和失败恢复。"

red_flags:
  - "直接删列、改类型、收紧约束或新增非空无默认值"
  - "代码先依赖新 schema，但 migration、兼容窗口或回滚路径缺失"
  - "回填缺少幂等性、批次范围、失败恢复或人工审查"
  - "contract 步骤与 expand/migrate 混在同一个 task"

checks:
  - "spec.md 和 tasks.md 已记录 migration、兼容窗口、回滚和验证 ID"
  - "migration 或脚本路径可定位，回填策略可复核"
  - "旧版本、回滚版本和消费者兼容性已检查或记录为风险"

rules:
  constraint_levels:
    mandatory: "违反则停止执行"
    warning: "触发时需人工确认或补充说明"
    verification: "完成后必须检查"

  scope:
    - "新增、删除、重命名、修改表/列/索引"
    - "新增 migration 脚本或手工 DDL"
    - "数据回填、批量修复、历史数据重算"
    - "读写兼容窗口、双写、灰度迁移、schema 收缩"

  principles:
    - "schema 变更必须通过可审查的 migration 或等价变更脚本交付，不得仅口头说明'上线时手改库'"
    - "任何破坏性数据库变更都必须显式说明兼容窗口与回滚路径"
    - "数据回填与业务逻辑改动默认视为高风险；若能拆分，优先拆成独立 task 或独立 change"
    - "cc-review 必须检查：spec 中声明的数据变更、实际 migration、代码兼容策略三者是否一致"

  change_classification:
    - type: expand
      examples: "新增可空列、新增兼容索引"
      default_risk: "中"
    - type: migrate
      examples: "回填历史数据、双写、数据搬迁"
      default_risk: "高"
    - type: contract
      examples: "删除列、收紧约束、切换读路径、删除旧索引"
      default_risk: "高"

  mandatory:
    - "禁止在未说明 migration 路径时修改依赖新 schema 的代码"
    - "禁止将'新增非空列且无默认值''直接删列''直接改列类型'视为低风险改动"
    - "禁止未说明幂等性、批量范围、失败恢复方式就执行数据回填"
    - "禁止在未确认兼容窗口结束前删除旧字段读写逻辑"
    - "禁止将数据库破坏性变更与无关业务改动混在同一个 task 中提交"

  warning_scenarios:
    items:
      - "新增非空约束、唯一约束、外键、默认值变更"
      - "大表加索引、索引重建、字段类型调整"
      - "历史数据回填、批量修复、离线脚本"
      - "读写双写、双读、切流、灰度迁移"
      - "会影响旧版本服务实例、旧消息消费者或回滚版本的 schema 变更"
    minimum_explanation:
      - "兼容窗口"
      - "回滚路径"
      - "失败后恢复方式"
      - "是否需要人工审查"

  phase_guidance:
    expand:
      - "优先新增兼容字段或索引，不立即删除旧结构"
      - "新代码上线前，旧代码应仍可正常读写"
    migrate:
      - "回填脚本要说明执行范围、批次、幂等性、停止条件"
      - "需要写明'失败后重跑是否安全'"
    contract:
      - "只有在旧代码路径、旧消费者、回滚版本都不再依赖旧 schema 时，才允许收缩"
      - "收缩前必须说明兼容窗口已结束"

  minimum_verification:
    - "spec.md 已记录 migration / 兼容窗口 / 回滚路径"
    - "tasks.md 已将 schema 变更、回填、业务代码切换拆出清晰顺序"
    - "实际 migration 或脚本路径可定位"
    - "若涉及回填，已说明幂等性、批次策略和失败恢复方式"
    - "若涉及破坏性变更，已说明旧版本兼容性与回滚影响"

relevance:
  category: change_type
  triggers:
    - when_task_touches_database
    - when_finding_touches_database
    - when_change_touches_database
