id: code_intelligence
description: "当环境中存在代码智能 MCP 后端（code-review-graph）时，优先使用知识图谱工具替代全量文件读取以减少 token 消耗"

trigger:
  - "cc-review、cc-inspect-codebase、cc-explain-system 或 cc-init 命令执行中"
  - "MCP 工具列表中存在 get_minimal_context、query_graph、detect_changes"
  - "或 CLI 命令 code-review-graph 可用"

skip:
  - "项目文件数 <50 且无复杂依赖关系时跳过图谱加速"
  - "图谱工具返回错误或超时时安静回退到标准全量读取模式"
  - "不得因图谱不可用而阻塞命令执行"

process:
  - "探测：检查 MCP 工具列表中是否存在 get_minimal_context、detect_changes"
  - "探活：调用 get_minimal_context 验证图谱可用且返回有效 JSON"
  - "Freshness Gate（关键）：调用 detect_changes 检查是否存在未索引的代码变更"
  - "若 detect_changes 返回空（无变更）→ 图谱与代码一致，进入加速模式"
  - "若 detect_changes 返回未索引变更 → 尝试 code-review-graph update（CLI 可用时，<2s）"
  - "若 update 成功 → 重新探活，进入加速模式"
  - "若 update 失败或 CLI 不可用 → 记录 warning，对变更文件回退 Read，对未变更部分继续使用图谱"
  - "若图谱整体过期（上次索引 >24h 且存在大量未索引变更）→ 提示用户运行 code-review-graph build，全局回退标准流程"
  - "加速：按命令映射表使用图谱工具获取结构化上下文"
  - "回退：图谱工具不可用、出错或返回空时，安静回退到现有 Read/Grep 流程"
  - "校验：图谱返回的结构信息（调用链、继承关系）不替代具体代码阅读；涉及实现细节时必须回退 Read"

detection:
  primary:
    method: mcp_tool_availability
    signature_tools:
      - get_minimal_context
      - query_graph
      - detect_changes
    note: "三个工具同时存在即确认 code-review-graph MCP server 已连接且可用"
  auxiliary:
    - method: cli_availability
      command: "which code-review-graph || pip show code-review-graph"
      note: "CLI 存在但 MCP 工具不存在时，提示用户运行 code-review-graph install 配置 MCP"
    - method: graph_db_check
      path: ".code-review-graph/graph.db"
      note: "数据库存在但 MCP 工具不存在时，提示 MCP server 可能未启动"

command_integration:
  cc-review:
    primary:
      - tool: get_minimal_context
        purpose: "获取全局图统计、风险分数、受影响函数，~100 token"
      - tool: get_review_context
        purpose: "获取 token 优化的审查上下文和结构摘要"
      - tool: detect_changes
        purpose: "风险评分的变更影响分析"
      - tool: get_impact_radius
        purpose: "通过 SQLite 递归 CTE 计算爆炸半径"
    fallback: "回退到现有审查流程：读取 spec.md → 读取变更文件 → 逐文件审查"
  cc-inspect-codebase:
    primary:
      - tool: get_minimal_context
        purpose: "快速获取项目全局结构"
      - tool: query_graph
        purpose: "查询调用者、被调用者、测试、导入、继承关系"
      - tool: get_impact_radius
        purpose: "理解模块间影响范围"
    fallback: "回退到现有模式（architecture/logic/observability/test_debt）全量文件遍历"
  cc-explain-system:
    primary:
      - tool: get_minimal_context
        purpose: "获取架构全貌"
      - prompt: architecture_map
        purpose: "生成架构图和模块关系说明"
    fallback: "回退到现有 scope 解析 → 全量代码遍历 → 手工生成架构说明"
  cc-init:
    primary:
      - check: "code-review-graph CLI 是否可用"
      - check: ".code-review-graph/graph.db 是否已存在"
      - action: "CLI 可用且 graph.db 不存在 → 输出提示建议运行 code-review-graph build"
      - action: "CLI 不可用 → 输出提示建议 pip install code-review-graph && code-review-graph build"
      - action: "graph.db 已存在 → 确认可用，不重复提示"
    fallback: "code-review-graph 相关提示不影响 cc-init 正常流程"

anti_rationalization:
  - claim: "图谱可能过期，还是全读一遍保险"
    reality: "Freshness Gate 在每次命令执行时通过 detect_changes 验证 SHA-256 哈希一致性；只有确认无未索引变更后才使用图谱；有变更时自动 update 或对变更部分回退 Read"
  - claim: "daemon 在跑，图谱肯定是最新的"
    reality: "daemon 可能未启动、被 kill 或延迟；不得假设图谱新鲜，必须通过 detect_changes 验证"
  - claim: "用图谱就够了，不需要读任何文件"
    reality: "图谱覆盖结构和关系，具体实现细节、业务逻辑、错误处理仍需按需 Read 文件"
  - claim: "这个小项目不需要图谱"
    reality: "项目 <50 文件时 topic rule 的 skip 条件已自动跳过；但对中型以上项目，token 节省显著（6-16x）"

red_flags:
  - "图谱返回的结构信息与代码实际不符（可能索引过期），必须回退 Read 并提示用户运行 code-review-graph update"
  - "仅凭图谱输出做出代码正确性判断而未阅读实际实现"

checks:
  - "图谱加速模式下，关键实现细节仍有 Read 证据支撑"
  - "图谱不可用时已安静回退，未阻塞命令正常执行"
  - "cc-init 中已按检测结果给出适当提示"

rules:
  detection_order:
    - priority: 1
      method: "MCP 工具探活（get_minimal_context）"
      action: "可用则进入 Freshness Gate"
    - priority: 2
      method: "CLI 可用性 + graph.db 存在性"
      action: "CLI 和 DB 都就绪但 MCP 工具缺失时，提示配置 MCP server"
    - priority: 3
      method: "CLI 可用但 DB 不存在"
      action: "在 cc-init 中提示运行 build；其他命令中安静跳过"
    - priority: 4
      method: "全部不可用"
      action: "安静跳过，回退到标准流程"

  freshness_gate:
    description: "每次使用图谱前必须验证数据新鲜度，不得假设 daemon/hook 已保持同步"
    step_1:
      method: "detect_changes（MCP 工具）"
      purpose: "对比当前源文件 SHA-256 与图谱中存储的哈希"
      outcomes:
        no_changes: "图谱与代码一致，安全进入加速模式"
        has_changes: "进入 step_2"
    step_2:
      method: "code-review-graph update（CLI）"
      purpose: "增量更新，仅重解析变更文件及其依赖方，通常 <2s"
      outcomes:
        update_ok: "回到 step_1 重新 detect_changes，确认无变更后进入加速模式"
        update_failed: "进入 step_3"
        cli_unavailable: "进入 step_3"
    step_3:
      method: "混合模式"
      purpose: "对未索引变更的文件回退 Read；对未变更部分继续使用图谱查询"
      constraint: "不得对变更文件及其直接依赖方使用图谱结论"
      warning: "提示用户图谱有未索引变更，建议运行 code-review-graph update"
    step_4:
      method: "全局过期检测"
      trigger: "detect_changes 返回大量未索引变更（>20% 文件）或上次索引时间 >24h"
      action: "提示用户运行 code-review-graph build，本命令回退标准全量读取流程"

  tool_mapping:
    get_minimal_context:
      returns: "图统计、风险分数、受影响实体、建议下一步工具"
      token_cost: "~100 tokens"
    query_graph:
      returns: "调用者、被调用者、测试、导入、继承关系"
      token_cost: "按查询范围变化"
    get_review_context:
      returns: "token 优化的审查上下文和结构摘要"
      token_cost: "按变更范围变化"
    detect_changes:
      returns: "风险评分的变更文件列表和影响分析"
      token_cost: "按变更文件数变化"
    get_impact_radius:
      returns: "爆炸半径：受影响的所有节点/文件（BFS 遍历）"
      token_cost: "按图遍历深度变化"
    architecture_map:
      returns: "架构图（Mermaid 格式）和模块关系说明"
      token_cost: "按项目规模变化"

relevance:
  category: change_type
  triggers:
    - when_code_intelligence_mcp_available
    - when_cc_review_or_inspect_or_explain_or_init
    - when_token_efficiency_improvement_possible
