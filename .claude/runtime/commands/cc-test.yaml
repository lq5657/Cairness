command: cc-test
summary: Add test design and fresh evidence to supplement or recover change validation without replacing apply minimum verification.

inputs:
  required:
    - change_id
  optional:
    - mode

state:
  change_from:
    - apply
    - review
  change_to: unchanged

writes:
  - test_files
  - .cc/changes/<change-id>/test-spec.md
  - .cc/changes/<change-id>/log.md
  - .cc/changes/<change-id>/spec.md
  - .cc/changes/task-board.md

forbids:
  - use_cc_test_as_default_apply_minimum_verification
  - fabricate_red_green
  - mark_mapping_closed_without_evidence

required_reads:
  - .cc/changes/<change-id>/spec.md
  - .cc/changes/<change-id>/tasks.md
  - .cc/changes/task-board.md

optional_reads:
  - .cc/changes/<change-id>/test-spec.md
  - .cc/changes/<change-id>/log.md

conditional_reads:
  when_writing_test_spec_artifact:
    - .claude/templates/changes/test-spec.md

runtime_protocol_reads:
  language_profile: on_demand
  technology_catalog: never

preconditions:
  - spec_status_is_apply_or_review
  - choose_mode_supplement_or_recovery
  - if_recovery_then_blocked_or_partial_record_exists
  - distinguish_apply_completed_evidence_from_test_supplement
  - read_validation_mapping_and_task_test_requirements

topic_rules:
  always:
    - .claude/runtime/topic-rules/testing-strategy.yaml
    - .claude/runtime/topic-rules/verification.yaml
  when_change_touches_database:
    - .claude/runtime/topic-rules/database-changes.yaml
  when_change_touches_external_contract:
    - .claude/runtime/topic-rules/api-compatibility.yaml
  when_change_touches_configuration:
    - .claude/runtime/topic-rules/configuration.yaml
  when_change_touches_observability:
    - .claude/runtime/topic-rules/observability.yaml
  when_change_touches_release_or_rollback:
    - .claude/runtime/topic-rules/release.yaml
  when_change_touches_security_boundary:
    - .claude/runtime/topic-rules/security.yaml
  when_recovery_requires_debugging_a_failure:
    - .claude/runtime/topic-rules/debugging-workflow.yaml
  when_test_depends_on_external_tooling_or_version_sensitive_behavior:
    - .claude/runtime/topic-rules/source-driven-development.yaml

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  contract: .claude/runtime/subagents/cc-test.yaml

anti_rationalizations:
  - use_supplement_mode_to_cover_apply_minimum_gap
  - fabricate_or_imply_red_green_without_output
  - close_mapping_with_unrelated_low_level_tests
  - treat_old_test_output_as_fresh_evidence

red_flags:
  - recovery_mode_without_blocked_or_partial_apply_record
  - test_level_does_not_match_risk
  - manual_evidence_missing_environment_input_output_or_result
  - mapping_status_changed_without_evidence_reference

steps:
  - confirm_test_mode
  - choose_test_levels_and_explain_why
  - load_test_spec_template_before_writing
  - write_or_update_test_spec
  - generate_fresh_test_evidence
  - update_mapping_status_to_test_covered_or_gap
  - sync_task_board
  - run_change_validation

auto_validation:
  - .claude/scripts/cc-verify --change <change-id>

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - test_spec
      - fresh_test_output
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
  next_actions:
    - return_to_apply_or_review

stop_conditions:
  - missing_required_argument
  - invalid_mode
  - recovery_mode_without_blocked_or_partial_record
  - evidence_missing_for_declared_level
  - change_validation_failed
