name: harness

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Verify Harness
        run: .claude/scripts/cc-verify --harness-only --verbose
      - name: Validate Evals
        run: .claude/scripts/cc-eval .claude/evals
      - name: Verify Fixture
        run: .claude/scripts/cc-verify --fixture .claude/fixtures/go-http-user-service --verbose
