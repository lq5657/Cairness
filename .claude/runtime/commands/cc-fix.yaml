command: cc-fix
summary: Resolve review findings with minimal scoped fixes and keep the change in review.

inputs:
  required:
    - change_id
  optional:
    - fix_description

state:
  change_from:
    - review
  change_to: review

writes:
  - finding_related_code_files
  - test_files
  - .cc/changes/<change-id>/review.md
  - .cc/changes/<change-id>/log.md
  - .cc/changes/<change-id>/spec.md
  - .cc/changes/<change-id>/tasks.md
  - .cc/changes/<change-id>/test-spec.md
  - .cc/context/dev-map.md
  - .cc/changes/task-board.md

forbids:
  - handle_unrecorded_scope
  - bypass_review
  - delete_open_finding_record
  - mark_fixed_without_verification
  - treat_unclear_finding_as_confirmed
  - mark_finding_accepted_without_user_choice

required_reads:
  - .cc/changes/<change-id>/review.md
  - .cc/changes/task-board.md

conditional_reads:
  when_selected_finding_needs_spec_or_task_context:
    - .cc/changes/<change-id>/spec.md
    - .cc/changes/<change-id>/tasks.md
  when_fix_requires_existing_execution_history:
    - .cc/changes/<change-id>/log.md

optional_reads:
  - .cc/changes/<change-id>/test-spec.md
  - .cc/context/dev-map.md

runtime_protocol_reads:
  language_profile: on_demand
  technology_catalog: never

preconditions:
  - select_open_findings_only_by_default
  - cc_fix_change_id_defaults_to_next_eligible_open_finding
  - explicit_finding_id_or_fix_description_locks_scope
  - start_from_review_finding_before_loading_full_change_docs
  - load_spec_tasks_or_log_only_when_selected_finding_requires_that_context
  - restate_finding_in_technical_terms
  - confirm_finding_still_applies_or_record_why_not
  - build_smallest_feedback_loop_before_patch
  - separate_symptom_failure_point_and_root_cause
  - record_reproduction_blocker_substitute_evidence_and_residual_risk_when_loop_is_impossible
  - no_fix_without_evidence_backed_root_cause
  - record_feedback_loop_symptom_failure_point_root_cause_fix_guard
  - block_when_log_or_reproduction_evidence_is_insufficient
  - define_minimal_fix_hypothesis

interaction_contract:
  mode: interactive_required
  clarification:
    when: finding_unclear_disputed_or_no_longer_reproducible
    presentation:
      - show_finding_understanding_and_evidence_gap
      - show_root_cause_evidence_gap_before_fixing
      - ask_numbered_questions_for_unclear_finding
      - wait_for_user_answer_before_fixing
    blocking_behavior:
      - do_not_implement_unclear_finding
      - next_action_must_be_answer_finding_clarification
    max_questions_per_round: 3
    resolution_required_before_ready: true
  confirmation:
    when: finding_should_be_accepted_reframed_or_scope_expanded
    presentation:
      - show_accept_reframe_or_scope_expansion_options
      - ask_user_only_when_accept_reframe_or_scope_expansion_needed
      - record_selected_finding_disposition
    confirmation_options:
      - continue_with_minimal_fix_after_scope_confirmation
      - mark_finding_accepted
      - request_review_update
    required_confirmations:
      - finding_disposition
      - minimal_fix_scope
      - accepted_risk_when_applicable
    blocking_behavior:
      - do_not_mark_fixed_or_accepted_without_explicit_basis
      - next_action_must_be_choose_finding_disposition

topic_rules:
  always:
    - .claude/rules/verification.md
  when_reproduction_or_failure_localization_is_required:
    - .claude/rules/debugging-workflow.md
  when_test_boundary_or_substitution_is_in_question:
    - .claude/rules/testing-strategy.md
  when_finding_touches_database:
    - .claude/rules/database-changes.md
  when_finding_touches_external_contract:
    - .claude/rules/api-compatibility.md
  when_finding_touches_configuration:
    - .claude/rules/configuration.md
  when_finding_touches_observability:
    - .claude/rules/observability.md
  when_finding_touches_release_or_rollback:
    - .claude/rules/release.md
  when_finding_touches_security_boundary:
    - .claude/rules/security.md
  when_fix_depends_on_external_or_version_sensitive_technology:
    - .claude/rules/source-driven-development.md
  when_finding_touches_dependency_or_wave_order:
    - .claude/rules/git-workflow.md

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  contract: .claude/runtime/subagents/cc-fix.yaml

anti_rationalizations:
  - treat_reviewer_text_as_proven_root_cause
  - skip_feedback_loop_because_patch_seems_obvious
  - suggest_patch_before_root_cause_is_evidence_backed
  - implement_fix_before_reproducing_or_confirming_finding
  - broaden_fix_into_unrelated_cleanup
  - leave_temporary_debug_instrumentation_in_final_patch
  - mark_fixed_without_guard_or_fresh_verification

red_flags:
  - feedback_loop_missing_before_patch
  - root_cause_not_backed_by_code_or_command_evidence
  - fix_hypothesis_not_linked_to_failure_point
  - log_or_reproduction_gap_hidden_as_confidence
  - temporary_debug_artifacts_left_in_final_writes
  - patch_touches_files_outside_finding_scope
  - reproduction_impossible_without_substitute_evidence
  - verification_failure_dismissed_without_delta_analysis

steps:
  - load_open_findings
  - select_one_eligible_open_finding
  - load_only_targeted_change_context_needed_for_selected_finding
  - build_smallest_feedback_loop_for_reproduction_or_substitute_evidence
  - confirm_problem_still_applies_with_smallest_evidence
  - present_unclear_finding_questions_or_disposition_choices
  - collect_required_logs_commands_or_substitute_evidence_when_missing
  - localize_failure_point
  - test_falsifiable_hypotheses_one_variable_at_a_time_when_needed
  - separate_symptom_failure_point_root_cause_and_blast_radius
  - stop_before_code_when_root_cause_unproven
  - record_feedback_loop_and_root_cause_ledger_in_log
  - use_structural_code_evidence_for_architecture_findings
  - define_minimal_fix_hypothesis
  - implement_minimal_fix
  - add_or_identify_regression_guard
  - remove_temporary_debug_instrumentation
  - rerun_verification_without_lowering_required_level
  - update_review_log_and_change_docs
  - sync_dev_map_if_boundaries_changed
  - sync_task_board
  - run_change_validation

auto_validation:
  - .claude/scripts/cc-verify --change <change-id>

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - finding_fix_evidence
      - fresh_verification
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - rerun_cc_review_or_continue_fixes
    - answer_finding_clarification_or_choose_disposition

stop_conditions:
  - missing_required_argument
  - feedback_loop_missing_before_patch
  - finding_not_open_and_not_explicitly_reframed
  - root_cause_unproven
  - required_diagnostic_evidence_missing
  - minimal_fix_hypothesis_not_clear
  - unclear_finding_requires_user_answer
  - finding_disposition_missing
  - verification_failed
