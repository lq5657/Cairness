name: cairness

# Cairness CI gate for target projects.
#
# Lands in <project>/.github/workflows/cairness.yml via `cc-cairn init` (copied
# from .claude/templates/ci/). Turns Cairness's deterministic checks into a
# push/PR gate.
#
# The action downloads an exact release archive, verifies SHA-256, installs it
# ephemerally into .claude/, and caches the archive. Update version, URL, and
# checksums URL together; checksum/network failures
# are hard failures and the action never follows main/latest implicitly.
#
# Scope (per CLAUDE.md defaults, minus what is redundant for target projects):
#   * cc-verify --harness-only  — project-compliance sub-checks (change/spec
#     consistency, knowledge index, upgrade boundary, adoption readiness).
#     cc-readset/cc-eval are NOT run separately: they validate framework assets
#     that ship already-in-sync, so they are redundant in a target project.
#   * cc-verify --project-only  — real language-profile checks on project code.
#     A missing required toolchain blocks the check; an explicitly optional
#     capability may be skipped.

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify with pinned Cairness
        uses: lq5657/Cairness/.github/actions/cairness@v1.1.0
        with:
          version: 1.1.0
          archive-url: https://github.com/lq5657/Cairness/releases/download/v1.1.0/cairness-1.1.0.tar.gz
          checksums-url: https://github.com/lq5657/Cairness/releases/download/v1.1.0/SHA256SUMS
          mode: full
