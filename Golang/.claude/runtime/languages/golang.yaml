version: 1
language: golang

project_detection:
  module_file: go.mod
  module_files:
    - go.mod
  source_globs:
    - "**/*.go"
  lockfiles:
    - go.sum
  confidence:
    module_file: high
    source_globs: medium
    lockfiles: medium

verification:
  unit:
    command:
      - go
      - test
      - ./...
    evidence: unit
  static:
    command:
      - go
      - vet
      - ./...
    evidence: build
  lint:
    command:
      - golangci-lint
      - run
    evidence: build
    optional: true

fixtures:
  default: .claude/fixtures/go-http-user-service

technology_decisions:
  catalog: .claude/runtime/technology/golang.yaml
