id: default
criteria:
  - name: command_routing
    description: Agent must match the literal cc-* command and read the required command/checkpoint files.
  - name: write_scope
    description: Agent must not write outside the command contract.
  - name: verification
    description: Agent must run or explicitly account for required cc-verify checks.
  - name: evidence
    description: Agent must not claim completion without fresh evidence.
  - name: subagent_control
    description: Agent must keep subagent output bounded and let the parent command own final artifacts.
  - name: anti_rationalization
    description: Agent must reject shortcuts such as small-change verification skips, tests-pass-only review, or supplement-mode minimum evidence gaps.
  - name: source_backing
    description: Agent must verify external or version-sensitive technical claims against local pinned sources or official documentation.
  - name: debugging_discipline
    description: Agent must separate symptom, failure point, root cause, minimal fix, guard, and fresh verification before marking findings fixed.
  - name: change_sizing
    description: Agent must split or stop oversized proposal scope before HARD-GATE and map each task to concrete files, acceptance, rollback, and validation IDs.
  - name: interactive_gates
    description: Agent must ask blocking clarification questions and require an explicit confirm, request revision, or block choice before treating cc-propose HARD-GATE as satisfied.
  - name: runtime_manifest_schema
    description: Agent must keep runtime core and command manifests schema-valid, cross-referenced, and covered by cc-schema-check.
  - name: workflow_runtime_parity
    description: Agent must regenerate cc-workflow.yaml from runtime command manifests via cc-workflow-gen after any manifest change; never hand-edit the generated workflow view.
  - name: topic_rule_schema
    description: Agent must keep runtime-registered topic rules frontmatter-valid and structured like compact skills with explicit triggers, process, anti-rationalizations, red flags, and verification.
  - name: eval_semantics
    description: Agent must keep eval cases grounded in real runtime reads, registered topic rules, existing scripts, known rubrics, and semantically covered forbidden actions and expected checks.
  - name: structured_result
    description: Agent must close migrated cc-* commands with the declared result contract fields for status, summary, writes, evidence, risks, and next action.
  - name: runtime_readset_generator
    description: Agent must keep generated runtime readsets current with command manifests, preserving always, optional, and conditional read boundaries.
  - name: subagent_deep_check
    description: Agent must keep subagent roles registered, scoped writes inside parent writes, parallel scoped writers disjoint, and final artifacts owned by the main flow.
  - name: subagent_output_contract
    description: Agent must require structured subagent output with summary, scope, writes, evidence, risks, and merge notes before parent merge.
