command: cc-propose
summary: Create or update a formal change proposal without writing business code.

inputs:
  required:
    - requirement_description

state:
  change_from:
    - none
    - propose
  change_to: propose

writes:
  - .cc/changes/<change-id>/spec.md
  - .cc/changes/<change-id>/tasks.md
  - .cc/changes/<change-id>/log.md
  - .cc/changes/task-board.md

forbids:
  - write_business_code
  - enter_apply_without_hard_gate
  - skip_scope_freeze
  - skip_validation_mapping
  - create_oversized_or_mixed_scope_change
  - treat_listed_clarifications_as_resolved
  - treat_recommended_risk_resolution_as_if_user_selected_it
  - present_hard_gate_without_user_choice

required_reads:
  - .cc/context/project-summary.md
  - .cc/context/dev-map.md
  - .cc/changes/task-board.md

optional_reads:
  - .cc/context/project-context.md
  - .cc/context/domain-language.md

runtime_protocol_reads:
  technology_catalog: on_demand

preconditions:
  - decide_existing_project_change_vs_new_project
  - perform_minimum_local_research_before_broad_questions
  - choose_micro_or_staged_proposal_path
  - use_micro_spec_only_for_low_risk_single_scope_change
  - preserve_single_change_artifact_set_for_staged_interaction
  - classify_whether_technology_decision_catalog_is_needed
  - classify_whether_mature_alternative_check_is_needed
  - distinguish_resolved_vs_blocking_clarifications
  - check_request_terms_against_domain_language_when_present
  - distinguish_user_decision_risks_vs_residual_risks
  - check_change_conflicts_and_depends_on
  - classify_change_size_and_split_boundaries
  - freeze_scope_before_final_tasks
  - map_major_requirements_and_risks_to_validation_ids

interaction_contract:
  mode: interactive_required
  clarification:
    when: blocking_unknowns_or_user_decision_required_risks_affect_scope_acceptance_or_task_split_or_validation_boundary
    presentation:
      - show_current_understanding_summary
      - use_staged_sections_for_medium_or_complex_changes
      - confirm_requirements_current_state_solution_and_scope_before_hard_gate
      - distinguish_stage_confirmation_from_final_hard_gate
      - ask_numbered_questions_with_expected_answer_shape
      - challenge_domain_term_conflicts_before_scope_freeze
      - offer_explicit_options_when_question_has_known_choices
      - present_decision_options_with_recommendation_and_tradeoffs
      - wait_for_user_answer_before_freezing_scope
    blocking_behavior:
      - unresolved_blocking_clarifications_or_decision_risks_status_blocked_or_partial
      - do_not_freeze_scope_or_present_hard_gate_until_blockers_resolved
      - next_action_must_be_answer_clarification_questions_or_choose_risk_resolution
    max_questions_per_round: 4
    resolution_required_before_ready: true
  hard_gate:
    when: artifacts_written_and_auto_validation_passed_without_blocking_clarifications_or_unresolved_decision_risks
    presentation:
      - show_confirmable_items_scope_acceptance_confirmed_risk_decisions_residual_risks_validation_mapping
      - preserve_final_hard_gate_after_staged_confirmations
      - ask_user_to_choose_confirm_revise_or_block
      - record_selected_confirmation_in_spec_hard_gate
    confirmation_options:
      - confirm_scope_and_apply_next
      - request_revision
      - block_until_clarified
    required_confirmations:
      - confirmed_scope
      - resolved_risk_decisions
      - accepted_residual_risks
      - validation_mapping
      - human_review_status
    blocking_behavior:
      - do_not_enter_apply_without_explicit_user_confirmation
      - next_action_must_be_choose_hard_gate_confirmation_option

topic_rules:
  always:
    - .claude/rules/verification.md
    - .claude/rules/change-sizing.md
  when_validation_boundary_is_unclear:
    - .claude/rules/testing-strategy.md
  when_change_touches_database:
    - .claude/rules/database-changes.md
  when_change_touches_external_contract:
    - .claude/rules/api-compatibility.md
  when_change_touches_configuration:
    - .claude/rules/configuration.md
  when_change_touches_observability:
    - .claude/rules/observability.md
  when_change_touches_release_or_rollback:
    - .claude/rules/release.md
  when_change_touches_security_boundary:
    - .claude/rules/security.md
  when_change_depends_on_external_or_version_sensitive_technology:
    - .claude/rules/source-driven-development.md
  when_mature_alternative_check_is_triggered:
    - .claude/rules/source-driven-development.md
  when_change_has_dependency_or_parallelism_constraints:
    - .claude/rules/git-workflow.md

steps:
  - classify_request
  - choose_micro_or_staged_proposal_path
  - read_project_summary_and_navigation
  - read_domain_language_when_terms_affect_scope_acceptance_or_validation
  - read_full_project_context_only_when_summary_is_insufficient
  - restate_goal_and_constraints
  - clarify_only_high_value_unknowns_and_decision_risks
  - resolve_domain_term_ambiguity_or_record_pending_before_freezing_scope
  - present_blocking_clarification_questions_or_risk_resolution_choices_and_wait_for_answers
  - confirm_requirement_stage_when_scope_affecting_questions_are_resolved
  - classify_scope_axes_and_size
  - read_technology_catalog_only_for_triggered_change_level_decisions
  - classify_whether_mature_alternative_check_is_needed
  - research_mature_alternatives_only_when_triggered
  - compare_local_pattern_external_option_and_custom_build
  - compare_recommended_vs_rejected_option
  - confirm_solution_stage_when_options_change_scope_or_risk
  - split_or_phase_oversized_work
  - freeze_in_scope_and_out_of_scope
  - record_user_selected_risk_resolution_paths
  - record_mature_alternative_check_and_user_selected_option
  - for_micro_change_write_compressed_spec_and_single_task
  - confirm_scope_stage_before_final_tasks
  - record_split_rationale_dependencies_and_parallel_safety
  - write_spec
  - write_tasks
  - sync_task_board
  - run_auto_validation
  - present_hard_gate_choices_and_wait_for_user_selection
  - wait_for_hard_gate_confirmation

anti_rationalizations:
  - keep_broad_request_as_one_change_because_user_asked_for_all_of_it
  - defer_task_scope_split_to_cc_apply
  - merge_unrelated_risks_under_one_validation_mapping
  - claim_task_is_small_without_declared_file_scope_acceptance_and_evidence
  - treat_clarification_list_as_if_user_answered_it
  - choose_risk_resolution_for_user_because_one_option_seems_best
  - treat_hard_gate_summary_as_if_user_confirmed_it
  - reopen_full_technology_stack_for_change_without_triggered_decision
  - treat_stage_confirmation_as_final_hard_gate_confirmation
  - use_micro_spec_for_change_with_external_contract_or_release_risk
  - skip_mature_alternative_check_when_custom_build_has_high_cost
  - perform_broad_external_search_without_trigger

red_flags:
  - task_scope_writes_broad_directories_without_named_modules
  - validation_ids_cannot_map_to_specific_tasks
  - domain_term_conflict_ignored_before_hard_gate
  - rollback_differs_across_items_inside_one_task
  - subagents_would_need_overlapping_write_scopes
  - micro_spec_used_for_database_security_external_contract_release_or_multi_file_change
  - custom_build_selected_without_local_or_mature_alternative_comparison
  - staged_interaction_creates_documents_outside_change_artifacts
  - final_output_contains_pending_questions_but_no_direct_question_to_user
  - final_output_contains_unresolved_decision_risks_or_implicit_resolution_choice
  - final_output_says_execute_cc_apply_without_confirm_revise_block_options
  - technology_catalog_read_without_change_level_decision_trigger

auto_validation:
  - .claude/scripts/cc-verify --harness-only --change <change-id>

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - hard_gate_state
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - wait_for_hard_gate_or_revise_scope
    - answer_clarification_questions_or_choose_risk_resolution
    - choose_hard_gate_confirmation_option

stop_conditions:
  - missing_required_argument
  - unresolved_blocking_clarifications
  - unresolved_decision_risks
  - user_answer_required_for_blocking_clarification
  - user_choice_required_for_risk_resolution
  - oversized_scope_without_split_or_human_exception
  - micro_spec_eligibility_not_met
  - staged_confirmation_missing_for_scope_affecting_section
  - mature_alternative_decision_missing
  - task_traceability_not_closed
  - auto_validation_failed
  - hard_gate_confirmation_missing
