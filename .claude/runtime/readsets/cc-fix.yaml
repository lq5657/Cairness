version: 1
command: cc-fix
source_manifest: .claude/runtime/commands/cc-fix.yaml
generated_from:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-fix.yaml
- .claude/runtime/result-contracts/standard-command.yaml
always_reads:
- .claude/runtime/core.yaml
- .claude/runtime/protocol.yaml
- .claude/runtime/commands/cc-fix.yaml
- .claude/runtime/result-contracts/standard-command.yaml
- .cc/changes/<change-id>/review.md
- .cc/changes/task-board.md
- .claude/rules/verification.md
optional_reads:
- .cc/changes/<change-id>/test-spec.md
- .cc/context/dev-map.md
conditional_reads:
  when_selected_finding_needs_spec_or_task_context:
  - .cc/changes/<change-id>/spec.md
  - .cc/changes/<change-id>/tasks.md
  when_fix_requires_existing_execution_history:
  - .cc/changes/<change-id>/log.md
  when_reproduction_or_failure_localization_is_required:
  - .claude/rules/debugging-workflow.md
  when_test_boundary_or_substitution_is_in_question:
  - .claude/rules/testing-strategy.md
  when_finding_touches_database:
  - .claude/rules/database-changes.md
  when_finding_touches_external_contract:
  - .claude/rules/api-compatibility.md
  when_finding_touches_configuration:
  - .claude/rules/configuration.md
  when_finding_touches_observability:
  - .claude/rules/observability.md
  when_finding_touches_release_or_rollback:
  - .claude/rules/release.md
  when_finding_touches_security_boundary:
  - .claude/rules/security.md
  when_fix_depends_on_external_or_version_sensitive_technology:
  - .claude/rules/source-driven-development.md
  when_finding_touches_dependency_or_wave_order:
  - .claude/rules/git-workflow.md
  when_language_profile_resolution_is_required:
  - .claude/runtime/protocol/language-profile.yaml
  - .claude/runtime/languages/golang.yaml
  when_subagent_delegation_is_used:
  - .claude/docs/maintenance/subagent-model.md
  - .claude/runtime/subagents/cc-fix.yaml
