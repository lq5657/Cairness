# Machine-readable workflow definition for all cc-* commands.
# GENERATED by .claude/scripts/cc-workflow-gen from runtime command manifests
# (.claude/runtime/commands/*.yaml). Do not hand-edit; regenerate with
# `cc-workflow-gen --write` after changing a manifest. The runtime manifest is
# the single source of truth for command state, write scope, validation
# wiring, and coverage; this file is the derived view consumed by CI and
# tooling (cc-role-check, cc-lint, humans). Staleness is caught by
# `cc-workflow-gen --check` (wired into cc-verify).

version: 1
workflow_id: cc-spec-harness-cc-workflow

sources:
  runtime_core: .claude/runtime/core.yaml
  maintenance_guide: .claude/docs/maintenance/runtime-model.md

states:
  change: [propose, apply, review, done]
  task: [todo, in_progress, blocked, partial, aborted, done]
  finding: [open, fixed, accepted]
  validation_mapping: [todo, apply-covered, test-covered, gap]

commands:
  # cross-cutting / pre-adoption self-check
  cc-preflight:
    category: harness
    roles: [pm-orchestrator, gatekeeper, harness-maintainer]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [structured_preflight_result]
    writes: []
    validates: [harness_structure, commands, checkpoints, schemas, scripts, harness_config, workflow_definition, dev_map, task_board, role_contracts, memory_policy]
    forbids: [scan_business_code_deeply, create_business_change, auto_fix_scaffold, expand_into_project_audit]
    auto_validation: []

  # new-project entry path: discuss(optional) → new-project
  cc-discuss:
    category: discovery
    roles: [pm-orchestrator, requirement-analyst, solution-designer, researcher, context-curator]
    subagents: [research-analyst, project-context-analyst]
    change_from: [none]
    change_to: unchanged
    inputs: [topic_description, optional_discuss_id, optional_research_depth, optional_discuss_mode, optional_continue_discussion]
    outputs: [.cairness/discussions/<discuss-id>/brief.md, .cairness/discussions/<discuss-id>/log.md]
    writes: [.cairness/discussions/<discuss-id>/brief.md, .cairness/discussions/<discuss-id>/log.md]
    validates: [topic_scope, research_evidence, discussion_convergence, brief_accuracy, routing_selection]
    forbids: [business_code_write, change_creation, auto_enter_propose, auto_enter_new_project, fabricate_research, skip_challenging_assumptions, treat_vague_input_as_ready, skip_routing_selection]
    auto_validation: []

  cc-new-project:
    category: project
    roles: [pm-orchestrator, requirement-analyst, solution-designer, context-curator, backlog-curator, gatekeeper]
    change_from: [none]
    change_to: unchanged
    inputs: [project_idea]
    outputs: [.cairness/context/project-summary.md, .cairness/context/project-definition.md, .cairness/context/mvp-roadmap.md, .cairness/context/architecture-outline.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md, .cairness/changes/task-board.md]
    writes: [.cairness/context/project-summary.md, .cairness/context/project-definition.md, .cairness/context/mvp-roadmap.md, .cairness/context/architecture-outline.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md, .cairness/changes/task-board.md]
    validates: [project_goal, target_users, mvp_scope, out_of_scope, backlog_bridge, planned_path_status, memory_policy, blocking_project_decision_user_choice]
    forbids: [business_code_write, change_creation, auto_enter_propose, auto_enter_apply, treat_project_unknowns_as_resolved, treat_planned_paths_as_confirmed_facts, mark_project_definition_complete_without_blocking_choices]
    auto_validation: []

  # existing-project entry path: init → enrich(optional) → inspect-codebase(optional) → promote-audit(optional)
  cc-init:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [.cairness/context/project-summary.md, .cairness/context/project-context.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md]
    writes: [.cairness/context/project-summary.md, .cairness/context/project-context.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md]
    validates: [claude_scaffold_exists, entrypoints_status_recorded, domain_language_status_recorded, unknowns_recorded, memory_policy, existing_context_reconciled_against_repository, context_outputs_accounted_for_before_completion, project_context_basic_fact_read_is_bounded, project_context_supplemental_fact_layer_preserved, domain_language_evidence_sources_constrained]
    forbids: [create_scaffold_assets, create_change_or_audit, deep_code_review, expand_into_enrich_explain_or_inspect, record_assumptions_as_facts, treat_planned_paths_as_confirmed_facts, verification_only_completion, skip_reconciliation_because_context_files_exist, read_full_project_context_when_section_boundaries_are_available, rewrite_project_context_supplemental_fact_layer, broad_business_code_or_change_history_scan, promote_implementation_names_to_confirmed_domain_terms, force_domain_language_write_without_reliable_evidence]
    auto_validation: []

  cc-enrich-context:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [.cairness/context/project-context.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md]
    writes: [.cairness/context/project-context.md, .cairness/context/domain-language.md, .cairness/context/dev-map.md]
    validates: [base_context_exists, assumptions_confirmed, domain_language_terms_confirmed_or_pending, evidence_locations, confidence_level, memory_policy, blocking_assumption_user_confirmation]
    forbids: [finding_output, change_creation, audit_creation, assumptions_as_facts, auto_review_or_apply, treat_listed_assumptions_as_confirmed, write_unconfirmed_blocking_assumption_as_fact]
    auto_validation: []

  cc-inspect-codebase:
    category: audit
    roles: [pm-orchestrator, reviewer]
    subagents: [mode-audit-reviewer, scope-split-reviewer]
    change_from: [none]
    change_to: unchanged
    inputs: [mode, optional_scope]
    outputs: [.cairness/audits/<audit-id>/report.md]
    writes: [.cairness/audits/<audit-id>/report.md]
    validates: [valid_mode, bounded_scope, evidence_per_finding]
    forbids: [auto_fix, create_change_docs, review_existing_change_implementation, unsupported_findings, enter_promote_audit_automatically]
    auto_validation: []

  cc-promote-audit:
    category: audit_bridge
    roles: [pm-orchestrator, requirement-analyst, backlog-curator]
    change_from: [none]
    change_to: unchanged
    inputs: [audit_id, change_id]
    outputs: [.cairness/audits/<audit-id>/to-change.md, .cairness/changes/task-board.md]
    writes: [.cairness/audits/<audit-id>/to-change.md, .cairness/changes/task-board.md]
    validates: [finding_selection, scope_reduction, split_boundary, verification_level_hint, task_board_not_spec, finding_selection_user_choice]
    forbids: [copy_entire_audit_verbatim, write_formal_change_spec_directly, merge_unrelated_findings, auto_enter_propose, treat_all_findings_as_selected_by_default, write_bridge_without_finding_selection_choice]
    auto_validation: []

  # shared change trunk: propose → apply → review → fix → test → archive
  cc-propose:
    category: change
    roles: [pm-orchestrator, requirement-analyst, solution-designer, backlog-curator, gatekeeper]
    change_from: [none, propose]
    change_to: propose
    inputs: [requirement_description]
    outputs: [.cairness/changes/<change-id>/spec.md, .cairness/changes/<change-id>/tasks.md, .cairness/changes/<change-id>/log.md, .cairness/changes/task-board.md]
    writes: [.cairness/changes/<change-id>/spec.md, .cairness/changes/<change-id>/tasks.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/task-board.md]
    validates: [hard_gate, validation_matrix, dependencies, scope_freeze, task_traceability, task_board_sync, clarification_interaction, risk_resolution_interaction, hard_gate_user_choice]
    forbids: [write_business_code, enter_apply_without_hard_gate, skip_scope_freeze, skip_validation_mapping, create_oversized_or_mixed_scope_change, treat_listed_clarifications_as_resolved, treat_recommended_risk_resolution_as_if_user_selected_it, present_hard_gate_without_user_choice]
    auto_validation: [".claude/scripts/cc-deps conflicts --change <change-id>", ".claude/scripts/cc-verify --harness-only --change <change-id>"]

  cc-apply:
    category: change
    roles: [pm-orchestrator, developer, test-verifier, context-curator, backlog-curator, gatekeeper]
    subagents: [task-worker, test-verifier, context-curator]
    change_from: [propose, apply]
    change_to: review
    inputs: [change_id]
    outputs: [business_code_changes, change_docs_update, dev_map_update_if_needed, task_board_update, optional_commits]
    writes: [task_declared_code_files, test_files, .cairness/changes/<change-id>/spec.md, .cairness/changes/<change-id>/tasks.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/<change-id>/test-spec.md, .cairness/context/dev-map.md, .cairness/changes/task-board.md]
    validates: [hard_gate, task_gate, minimum_verification, git_policy, dirty_worktree_policy, baseline_delta, memory_sync, hard_gate_resolution_choice]
    forbids: [out_of_scope_change_without_spec_review_flag, silently_expand_implementation_beyond_spec_boundary, defer_minimum_verification_to_cc_test, mark_done_without_evidence, auto_push_or_merge, start_apply_with_stale_or_missing_hard_gate, treat_missing_hard_gate_as_user_confirmation, dispatch_tasks_across_waves_in_parallel, start_next_wave_with_unresolved_blocked_tasks, skip_wave_confirmation_gate, manually_edit_wave_plan_json]
    auto_validation: [".claude/scripts/cc-deps check --change <change-id>", ".claude/scripts/cc-wave-plan --check --change <change-id>", ".claude/scripts/cc-verify --json --output .cairness/changes/<change-id>/baseline/pre-apply.json --change <change-id>", ".claude/scripts/cc-delta-check --before <before-report> --after <after-report>", ".claude/scripts/cc-verify --change <change-id>", ".claude/scripts/cc-budget-check"]

  cc-review:
    category: change
    roles: [pm-orchestrator, spec-reviewer, code-quality-reviewer, reviewer, backlog-curator, gatekeeper]
    subagents: [spec-reviewer, code-quality-reviewer]
    change_from: [review]
    change_to: review
    inputs: [change_id]
    outputs: [.cairness/changes/<change-id>/review.md, .cairness/changes/task-board.md]
    writes: [.cairness/changes/<change-id>/review.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/task-board.md]
    validates: [task_coverage, verification_evidence, finding_status, evidence_matrix, role_contracts, finding_acceptance_interaction]
    forbids: [direct_code_change, direct_archive, pass_with_open_critical_or_important, delete_audit_record, mark_finding_accepted_without_user_choice, treat_reviewer_recommendation_as_user_acceptance, skip_file_review_scope_when_writing_review, skip_risk_triage_when_change_exceeds_200_lines, skip_location_and_existing_code_in_finding_details]
    auto_validation: [".claude/scripts/cc-role-check --command cc-review --change <change-id>", ".claude/scripts/cc-verify --harness-only --change <change-id>", ".claude/scripts/cc-verify --check-review-coverage --change <change-id>", ".claude/scripts/cc-verify --check-finding-locations --change <change-id>", ".claude/scripts/cc-verify --check-risk-triage --change <change-id>", ".claude/scripts/cc-budget-check"]

  cc-fix:
    category: change
    roles: [pm-orchestrator, developer, test-verifier, context-curator, backlog-curator, gatekeeper]
    subagents: [root-cause-reviewer, fix-worker, test-verifier]
    change_from: [review]
    change_to: review
    inputs: [change_id, optional_fix_description]
    outputs: [fixed_code, updated_findings, synced_change_docs, task_board_update]
    writes: [finding_related_code_files, test_files, .cairness/changes/<change-id>/review.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/<change-id>/spec.md, .cairness/changes/<change-id>/tasks.md, .cairness/changes/<change-id>/test-spec.md, .cairness/context/dev-map.md, .cairness/changes/task-board.md]
    validates: [finding_exists, root_cause, minimum_fix, verification_level_not_reduced, memory_sync, finding_clarification_or_disposition_choice]
    forbids: [handle_unrecorded_scope, bypass_review, delete_open_finding_record, mark_fixed_without_verification, treat_unclear_finding_as_confirmed, mark_finding_accepted_without_user_choice, remove_or_rewrite_file_review_scope_section_in_review_md, remove_or_rewrite_existing_code_or_location_in_finding_details, alter_risk_triage_section_in_review_md]
    auto_validation: [".claude/scripts/cc-verify --change <change-id>"]

  cc-test:
    category: change
    roles: [pm-orchestrator, test-verifier, backlog-curator, gatekeeper]
    subagents: [test-verifier]
    change_from: [apply, review]
    change_to: unchanged
    inputs: [change_id, optional_mode]
    outputs: [.cairness/changes/<change-id>/test-spec.md, tests_or_evidence, updated_mapping_status, task_board_update]
    writes: [test_files, .cairness/changes/<change-id>/test-spec.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/<change-id>/spec.md, .cairness/changes/task-board.md]
    validates: [valid_mode, recovery_blocker_record, fresh_evidence, mapping_closure, task_board_sync]
    forbids: [use_cc_test_as_default_apply_minimum_verification, fabricate_red_green, mark_mapping_closed_without_evidence]
    auto_validation: [".claude/scripts/cc-verify --change <change-id>"]

  cc-archive:
    category: change
    roles: [pm-orchestrator, backlog-curator, gatekeeper]
    change_from: [review]
    change_to: done
    inputs: [change_id]
    outputs: [done_status, archival_log, task_board_archive_state, optional_knowledge]
    writes: [.cairness/changes/<change-id>/spec.md, .cairness/changes/<change-id>/log.md, .cairness/changes/<change-id>/events.jsonl, .cairness/changes/task-board.md, .cairness/knowledge/<category>/*.md, .cairness/knowledge/refinement-candidates/*.md]
    validates: [review_pass, no_open_findings, no_blocked_tasks, no_unexplained_gap, fresh_evidence, memory_policy, knowledge_decision_user_choice]
    forbids: [business_code_write, skip_knowledge_decision, archive_with_open_or_blocked_state, set_done_from_other_command, infer_knowledge_decision_without_user_choice, mark_done_before_knowledge_choice, freeform_edit_of_knowledge_index_md]
    auto_validation: [".claude/scripts/cc-verify --change <change-id>", ".claude/scripts/cc-index-check"]

  # cross-cutting / documentation tool
  cc-explain-system:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: [optional_scope]
    outputs: [.cairness/context/system-overview.md]
    writes: [.cairness/context/system-overview.md]
    validates: [code_evidence, config_evidence, flow_evidence, bounded_scope]
    forbids: [finding_output, change_creation, audit_creation, business_code_write, preference_as_fact]
    auto_validation: []
