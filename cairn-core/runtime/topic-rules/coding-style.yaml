id: coding_style
description: "语言无关编码原则骨架，所有源码变更默认加载；语言特定规范见 go-coding-style 等子规则"

trigger:
  - "cc-apply / cc-fix / cc-review 始终加载本骨架（topic_rules.always）"
  - "cc-inspect-codebase architecture 模式加载本骨架"
  - "语言特定子规则由 cc-topic-trigger 检测后按 when_*_coding_style_pattern_is_detected 加载"

skip:
  - "不用它替代需求、验证等级、数据库、API 或发布规则"
  - "纯文档、纯 Harness 元数据或生成代码变更可只检查是否误改手写逻辑"
  - "不用局部编码偏好覆盖项目已确认的工程约定"

process:
  - "定位本次变更触及的手写代码、测试和依赖"
  - "按抽象、控制流、依赖和接口规则逐项检查"
  - "对魔法值、过度嵌套、过早抽象、无理由新增依赖等问题先修正再继续"
  - "若必须例外，记录原因、影响范围和验证证据"

anti_rationalization:
  - claim: "现有代码也这么写"
    reality: "既有不一致不是新增问题的授权；遵守当前规则或记录兼容旧代码的最小例外"
  - claim: "只是临时日志/临时 helper"
    reality: "临时代码经常进入主干并形成生产风险；按正式代码处理或明确删除路径和验证结果"
  - claim: "这个错误不会发生"
    reality: "未处理失败会隐藏真实失败点；返回、包装或显式记录不可达依据"

red_flags:
  - "业务路径新增敏感信息日志"
  - "新增第三方依赖但没有说明标准库或现有依赖为什么不足"
  - "魔法值散落在业务路径"
  - "无必要的深嵌套控制流（可早返回压平未压平）"
  - "过早抽象：无多实现/测试替身/明确解耦诉求即引入接口"

checks:
  - "代码 diff 已按本规则检查，例外已记录"
  - "cc-review 对抽象、控制流和依赖风险给出结论"
  - "语言特定规范（如有 go-coding-style 等）已按对应子规则检查"

rules:
  约束等级:
    强制: "必须遵守，违反会引入缺陷"
    警告: "应避免，特殊情况需注明原因"
    验证: "完成后自检"

  通用编码原则:
    强制:
      - "魔法值必须定义为常量"
      - "写接口必须考虑幂等"
    警告:
      - "控制流优先使用早返回，避免无必要的 else 嵌套"
      - "设计抽象默认使用具体类型，只有在测试替身、解耦或多实现确有需要时再引入接口"
      - "接口设计优先自底向上，小而聚焦的接口优先"
      - "新增第三方依赖必须说明标准库或现有依赖为什么不满足需求"
      - "并发场景必须说明同步策略"
    验证:
      - "是否有魔法值未定义为常量"
      - "接口是否考虑了幂等"
      - "是否可通过早返回压平控制流"
      - "是否存在明显过早抽象"
      - "新接口是否足够小且有明确用途"
      - "新增第三方依赖是否有充分理由"
      - "并发场景是否说明了同步策略"

relevance:
  category: always
  triggers:
    - always_loaded_by_cc_apply
    - always_loaded_by_cc_fix
    - always_loaded_by_cc_review
    - loaded_by_cc_inspect_codebase_architecture_mode
