id: loop
description: >-
  Loop Engineering 模式 — 适合自主循环执行与 CI/CD 集成。
  将 Tier-1 阻塞 gate 替换为 cc-self-eval 自评门 + 异步审计日志。
  human-on-the-loop：人在循环边界声明信任包络，异步审阅审计日志，
  仅在熔断条件触发时介入。需要 .cairness/loop-config.yaml。

topic_rules:
  always:
    - verification
    - change_sizing
    - coding_style
  conditional: all
  disabled: []

subagents:
  enabled: true

validation:
  mode: full
  run_on:
    propose:
      - cc-verify --harness-only
    apply:
      - cc-verify --execution-mode normal
    fix:
      - cc-verify --execution-mode normal
    test:
      - cc-verify --execution-mode ci
    review:
      - cc-verify --execution-mode ci
    archive:
      - cc-verify --execution-mode ci

interaction:
  skip_technology_confirmations: true
  skip_task_split_confirmations: true
  accept_recommended_defaults: true

wave_execution:
  enabled: true
  max_parallel: 10

loop_mode:
  trust_envelope_required: true
  trust_envelope_path: .cairness/loop-config.yaml

  gate_overrides:
    hard_gate_confirm:
      mode: self_eval
      handler: .claude/scripts/cc-self-eval
      escalate_on_fail: true
      audit: true
    finding_accepted:
      mode: auto_disposition
      auto_accept_severity_threshold: minor
      always_escalate_severity:
        - important
        - critical
        - security
    archive_done:
      mode: auto_archive
      knowledge_compounding_default: no_knowledge_compounding

  circuit_breakers:
    - change_type_disallowed_by_trust_envelope
    - scope_exceeds_trust_envelope
    - residual_risk_exceeds_trust_envelope
    - critical_finding_in_review
    - security_finding_in_review
    - verification_failed_twice_consecutively
    - state_inconsistency_detected
    - self_eval_failed_three_times_same_reason

  audit:
    enabled: true
    output_dir: .cairness/loop-audit
    file_pattern: "%Y-%m-%d.md"
