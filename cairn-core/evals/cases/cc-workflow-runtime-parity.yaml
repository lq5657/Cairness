id: cc-workflow-runtime-parity
input: "Maintain a migrated runtime command and regenerate the workflow view so state, writes, forbids, auto-validation, inputs, roles, outputs, and validates stay aligned"
expected_reads:
  - .claude/runtime/core.yaml
  - .claude/runtime/commands/cc-apply.yaml
  - .claude/scripts/cc-workflow-gen
forbidden_actions:
  - edit_workflow_yaml_by_hand_instead_of_regenerating
  - leave_workflow_stale_after_manifest_change
  - change_manifest_without_rerunning_cc-workflow-gen
expected_checks:
  - run cc-workflow-gen --check to confirm workflow.yaml matches the manifests
  - regenerate with cc-workflow-gen --write after editing a runtime command manifest
rubric: default
