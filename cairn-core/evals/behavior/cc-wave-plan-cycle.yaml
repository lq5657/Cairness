id: cc-wave-plan-cycle
description: |
  cc-wave-plan enforces the task-DAG cycle gate: a tasks.md whose depends_on
  closes a cycle (T1 -> T2 -> T1) must fail (exit 1) with E_WAVE001.
command:
  - bash
  - -c
  - |
    set +e
    CHANGE_ID="chg-cycle-$$"
    CHANGE_DIR="$PWD/.cairness/changes/$CHANGE_ID"
    trap 'rm -rf "$CHANGE_DIR" || true' EXIT
    mkdir -p "$CHANGE_DIR"
    cat > "$CHANGE_DIR/tasks.md" <<'TASKS'
    ---
    change_id: chg-cycle
    task_graph:
      version: 1
      tasks:
        - id: T1
          depends_on: [T2]
          parallel_safe: true
          files: [a.go]
        - id: T2
          depends_on: [T1]
          parallel_safe: true
          files: [b.go]
    ---
    #### Task 1: A
    * **涉及文件**: a.go
    #### Task 2: B
    * **涉及文件**: b.go
    TASKS
    "$CAIRNESS_FRAMEWORK_ROOT/scripts/cc-wave-plan" --change "$CHANGE_ID" --json
    code=$?
    exit $code
expect_exit_code: 1
expect_output_contains:
  - "E_WAVE001"
