command: cc-inspect-codebase
summary: Perform an explicit evidence-based brownfield codebase audit and write an audit report without fixing code.

category: audit
roles:
  - pm-orchestrator
  - reviewer
outputs:
  - .cairness/audits/<audit-id>/report.md
validates:
  - valid_mode
  - bounded_scope
  - evidence_per_finding
inputs:
  required:
    - mode
  optional:
    - scope

state:
  change_from:
    - none
  change_to: unchanged

writes:
  - .cairness/audits/<audit-id>/report.md

forbids:
  - auto_fix
  - create_change_docs
  - review_existing_change_implementation
  - unsupported_findings
  - enter_promote_audit_automatically

required_reads:
  - .cairness/context/project-summary.md

optional_reads:
  - .cairness/context/project-context.md

conditional_reads:
  when_writing_audit_report:
    - .claude/templates/audits/report.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - explicit_cc_inspect_codebase_command_received
  - mode_is_one_of_architecture_logic_observability_test_debt
  - scope_is_explicit_or_defaults_to_whole_repo
  - confirm_this_is_not_cc_review_or_cc_init
  - select_only_mode_relevant_rules_and_code_scope

topic_rules:
  when_mode_is_architecture:
    - .claude/runtime/topic-rules/coding-style.yaml
  when_mode_is_logic:
    - .claude/runtime/topic-rules/testing-strategy.yaml
    - .claude/runtime/topic-rules/security.yaml
  when_mode_is_observability:
    - .claude/runtime/topic-rules/observability.yaml
  when_mode_is_test_debt:
    - .claude/runtime/topic-rules/testing-strategy.yaml
    - .claude/runtime/topic-rules/verification.yaml

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  merge_owner: main_flow
  final_writes_by: main_flow
  write_scope_policy: parent_writes_subset
  parallel_policy: read_only_parallel_only
  agents:
    - name: mode-audit-reviewer
      role: reviewer
      mode: read_only
      trigger: inspect_selected_mode_and_scope
      writes: []
      output: evidence_backed_findings
      output_contract:
        format: structured_subagent_result
        required_fields:
          - summary
          - scope
          - writes
          - evidence
          - risks
          - merge_notes
        evidence_quality:
          min_evidence_items: 1
          min_risk_items: 1
          require_concrete_references: true
          allow_freeform: false
    - name: scope-split-reviewer
      role: reviewer
      mode: read_only
      trigger: optional_large_scope_split
      writes: []
      output: scoped_findings_fragment
      output_contract:
        format: structured_subagent_result
        required_fields:
          - summary
          - scope
          - writes
          - evidence
          - risks
          - merge_notes
        evidence_quality:
          min_evidence_items: 1
          min_risk_items: 1
          require_concrete_references: true
          allow_freeform: false
  merge_requirements:
    - main_flow_deduplicates_findings
    - main_flow_sets_final_severity
    - main_flow_writes_audit_report

steps:
  - validate_mode_and_scope
  - read_project_summary
  - read_full_project_context_only_for_extended_facts
  - load_minimum_mode_rules
  - inspect_scope_for_code_config_or_call_chain_evidence
  - group_findings_by_severity
  - identify_candidates_for_future_changes
  - load_audit_report_template_before_writing
  - write_audit_report
  - stop_without_promoting_audit_or_modifying_code

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - written_artifacts
      - audit_report
      - evidence_backed_findings
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
  next_actions:
    - promote_selected_audit_or_stop

stop_conditions:
  - missing_required_mode
  - invalid_mode
  - scope_too_large_without_bounded_plan
  - evidence_insufficient_for_findings
