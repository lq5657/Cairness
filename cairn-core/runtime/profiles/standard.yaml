id: standard
description: >-
  标准模式（默认）— 适合团队项目、生产代码。
  加载核心 topic rule，启用 subagent，完整验证链路，
  所有交互确认点生效。

topic_rules:
  always:
    - verification
    - change_sizing
    - coding_style
  conditional: all
  disabled: []

subagents:
  enabled: true

validation:
  mode: full
  run_on:
    propose:
      - cc-verify --harness-only
    apply:
      - cc-verify --execution-mode normal
    fix:
      - cc-verify --execution-mode normal
    test:
      - cc-verify --execution-mode ci
    review:
      - cc-verify --execution-mode ci
    archive:
      - cc-verify --execution-mode ci

interaction:
  skip_technology_confirmations: false
  skip_task_split_confirmations: false
  accept_recommended_defaults: false

wave_execution:
  enabled: true
  max_parallel: 10
  join_timeout_ms: 1800000
  cleanup_timeout_ms: 30000
