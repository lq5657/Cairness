# Golang Harness runtime policy.
# Relative paths are interpreted from `.claude/`.

git:
  auto_commit: true
  commit_per_task: true
  allow_main_branch_apply: false
  require_clean_worktree_before_commit: true

workflow:
  definition: ".claude/workflows/cc-workflow.yaml"
  lifecycle_state_machine: ".claude/rules/lifecycle-state-machine.md"
  command_contracts: ".claude/rules/command-contracts.md"

memory:
  project_context: ".claude/context/project-context.md"
  dev_map: ".claude/context/dev-map.md"
  task_board: ".claude/changes/task-board.md"
  policy: ".claude/rules/memory-policy.md"

roles:
  contracts: ".claude/rules/role-contracts.md"

validation:
  auto_run: true
  fail_on_error: true
  verify_command: ".claude/scripts/cc-verify"
  delta_command: ".claude/scripts/cc-delta-check"
  schema_command: ".claude/scripts/cc-schema-check"
  role_command: ".claude/scripts/cc-role-check"
  eval_command: ".claude/scripts/cc-eval"
  baseline_dir: "changes/<change-id>/baseline"
  fixture_dir: "fixtures"
  require_structured_hard_gate: true
  require_traceability_check: true
  go:
    test: true
    vet: true
    golangci_lint: false
  run_on:
    propose:
      - cc-verify --harness-only
    apply:
      - cc-verify
    fix:
      - cc-verify
    test:
      - cc-verify
    review:
      - cc-verify --harness-only
    archive:
      - cc-verify
