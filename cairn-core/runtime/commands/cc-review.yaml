command: cc-review
summary: Review one change in two stages and record findings without modifying business code.
summary_zh: 分两阶段审查一个 change 并记录发现,不修改业务代码。

category: change
roles:
  - pm-orchestrator
  - spec-reviewer
  - code-quality-reviewer
  - reviewer
  - backlog-curator
  - gatekeeper
outputs:
  - .cairness/changes/<change-id>/review.md
  - .cairness/changes/task-board.md
validates:
  - task_coverage
  - verification_evidence
  - finding_status
  - evidence_matrix
  - role_contracts
  - finding_acceptance_interaction
inputs:
  required:
    - change_id

state:
  change_from:
    - review
  change_to: review

writes:
  - .cairness/changes/<change-id>/review.md
  - .cairness/changes/<change-id>/log.md
  - .cairness/changes/task-board.md

forbids:
  - direct_code_change
  - direct_archive
  - pass_with_open_critical_or_important
  - delete_audit_record
  - mark_finding_accepted_without_user_choice
  - treat_reviewer_recommendation_as_user_acceptance
  - skip_file_review_scope_when_writing_review
  - skip_risk_triage_when_change_exceeds_200_lines
  - skip_location_and_existing_code_in_finding_details

required_reads:
  - .cairness/changes/<change-id>/spec.md
  - .cairness/changes/<change-id>/tasks.md
  - .cairness/changes/task-board.md
  - .cairness/knowledge/index.md

optional_reads:
  - .cairness/changes/<change-id>/review.md
  - .cairness/changes/<change-id>/test-spec.md
  - .cairness/context/domain-language.md
  - .cairness/context/mvp-roadmap.md

conditional_reads:
  when_writing_review_artifact:
    - .claude/templates/changes/review.md

runtime_protocol_reads:
  technology_catalog: never

preconditions:
  - spec_status_is_review
  - read_validation_mapping_and_existing_evidence
  - confirm_review_not_inspect_codebase
  - run_deterministic_topic_rule_detection
  - assess_change_size_for_risk_triage_decision
  - select_risk_lenses_from_spec_signals
  - select_default_and_triggered_review_lenses
  - select_domain_language_lens_when_terms_states_or_user_concepts_are_in_scope
  - summarize_review_lens_matrix_for_user
  - distinguish_fix_required_findings_vs_user_acceptance_candidates
  - check_log_for_spec_review_flags_from_cc_apply_boundary_discovery

interaction_contract:
  mode: interactive_required
  confirmation:
    when: finding_should_be_accepted_or_archive_viability_depends_on_risk_acceptance
    presentation:
      - show_acceptance_candidate_reason_impact_and_fix_alternative
      - ask_user_to_choose_fix_accept_or_revise_review
      - record_selected_finding_disposition_and_acceptance_basis
    confirmation_options:
      - keep_finding_open_and_run_cc_fix
      - mark_finding_accepted
      - request_review_revision
    required_confirmations:
      - finding_disposition
      - acceptance_basis_when_accepted
      - affected_review_conclusion
    blocking_behavior:
      - do_not_mark_finding_accepted_or_recommend_archive_without_explicit_user_choice
      - next_action_must_be_choose_finding_disposition

topic_rules:
  when_interaction_fatigue_detection_applies:
    - .claude/runtime/topic-rules/interaction-guidance.yaml
  always:
    - .claude/runtime/topic-rules/verification.yaml
  when_change_exceeds_triage_threshold:
    - .claude/runtime/topic-rules/change-sizing.yaml
  when_test_boundary_or_substitution_is_in_question:
    - .claude/runtime/topic-rules/testing-strategy.yaml
  when_change_touches_database:
    - .claude/runtime/topic-rules/database-changes.yaml
  when_change_touches_external_contract:
    - .claude/runtime/topic-rules/api-compatibility.yaml
  when_change_touches_configuration:
    - .claude/runtime/topic-rules/configuration.yaml
  when_change_touches_observability:
    - .claude/runtime/topic-rules/observability.yaml
  when_release_lens_is_triggered:
    - .claude/runtime/topic-rules/release.yaml
  when_security_lens_is_triggered:
    - .claude/runtime/topic-rules/security.yaml
  when_external_or_version_sensitive_claims_are_in_scope:
    - .claude/runtime/topic-rules/source-driven-development.yaml
  when_dependency_or_wave_order_is_in_dispute:
    - .claude/runtime/topic-rules/git-workflow.yaml
  when_spec_review_flags_present_in_log:
    - .claude/runtime/topic-rules/spec-code-sync.yaml
  when_go_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/go-concurrency.yaml
  when_go_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/go-performance.yaml
  when_python_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/python-concurrency.yaml
  when_python_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/python-performance.yaml
  when_java_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/java-concurrency.yaml
  when_java_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/java-performance.yaml
  when_typescript_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/typescript-concurrency.yaml
  when_typescript_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/typescript-performance.yaml
  when_cpp_concurrency_pattern_is_detected:
    - .claude/runtime/topic-rules/cpp-concurrency.yaml
  when_cpp_performance_analysis_is_needed:
    - .claude/runtime/topic-rules/cpp-performance.yaml
  when_knowledge_keyword_matched:
    - .claude/runtime/topic-rules/knowledge-loading.yaml

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  contract: .claude/runtime/subagents/cc-review.yaml

anti_rationalizations:
  - pass_review_because_tests_passed
  - skip_stage1_because_implementation_looks_reasonable
  - let_reviewer_subagent_write_final_review
  - run_all_lenses_without_trigger_and_overwhelm_user
  - hide_lens_matrix_from_user
  - accept_important_finding_without_reason_impact_and_no_fix_rationale
  - treat_strong_review_rationale_as_user_acceptance
  - skip_log_update_because_review_is_the_main_output
  - skip_task_board_updated_by_because_governance_is_implicit

red_flags:
  - open_critical_or_important_with_final_pass
  - validation_level_below_spec_requirement
  - stage2_runs_after_stage1_fail
  - review_missing_task_coverage_matrix
  - review_lens_triggered_but_not_recorded
  - finding_reported_without_lens_and_evidence
  - accepted_finding_missing_user_confirmation_record
  - spec_review_flag_in_log_not_reviewed_or_addressed
  - task_board_updated_by_not_cc_review
  - log_missing_review_stage_entry
  - file_review_scope_missing_or_empty
  - file_review_scope_has_unexplained_not_reviewed
  - risk_triage_missing_when_change_exceeds_200_lines

steps:
  - read_change_artifacts
  - build_review_lens_matrix
  - when_change_exceeds_triage_threshold_assess_review_risks
  - read_domain_language_when_review_lens_is_triggered
  - perform_stage1_spec_compliance
  - if_stage1_pass_then_perform_stage2_triggered_lenses
  - evaluate_task_coverage_and_mapping_closure
  - review_spec_review_flags_and_propose_spec_updates_as_findings
  - deduplicate_findings_by_root_cause_and_lens
  - present_acceptance_choices_and_wait_for_user_selection_when_needed
  - load_review_template_before_writing_review
  - emit_findings_with_open_fixed_or_accepted_status
  - sync_review_log_and_task_board
  - run_harness_validation
  - record_state_transition_event_via_cc_event_write

auto_validation:
  - .claude/scripts/cc-role-check --command cc-review --change <change-id>
  - .claude/scripts/cc-verify --harness-only --change <change-id>
  - .claude/scripts/cc-verify --check-review-coverage --change <change-id>
  - .claude/scripts/cc-verify --check-finding-locations --change <change-id>
  - .claude/scripts/cc-verify --check-risk-triage --change <change-id>
  - .claude/scripts/cc-budget-check

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - auto_validation
      - written_artifacts
      - review_findings
      - task_coverage
      - interaction_state
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - interaction_state
  next_actions:
    - run_cc_fix_or_cc_archive_or_choose_finding_disposition

stop_conditions:
  - spec_status_not_review
  - missing_required_argument
  - stage1_failed
  - review_lens_matrix_missing
  - open_critical_or_important_without_acceptance
  - finding_acceptance_choice_missing
  - harness_validation_failed
  - spec_review_flags_present_but_not_addressed_in_review
