# Machine-readable workflow definition for all cc-* commands.
# This file is the script and CI truth for lifecycle, write scope,
# validation wiring, and command coverage. Runtime manifests may
# provide slimmer execution guidance for high-frequency commands.

version: 1
workflow_id: cc-spec-harness-cc-workflow

sources:
  runtime_core: .claude/runtime/core.yaml
  maintenance_guide: .claude/docs/maintenance/runtime-model.md

states:
  change: [propose, apply, review, done]
  task: [todo, in_progress, blocked, partial, aborted, done]
  finding: [open, fixed, accepted]
  validation_mapping: [todo, apply-covered, test-covered, gap]

commands:
  cc-new-project:
    category: project
    roles: [pm-orchestrator, requirement-analyst, solution-designer, context-curator, backlog-curator, gatekeeper]
    change_from: [none]
    change_to: unchanged
    inputs: [project_idea]
    outputs: [.cc/context/project-summary.md, .cc/context/project-definition.md, .cc/context/mvp-roadmap.md, .cc/context/architecture-outline.md, .cc/context/domain-language.md, .cc/context/dev-map.md, .cc/changes/task-board.md]
    writes: [.cc/context/project-summary.md, .cc/context/project-definition.md, .cc/context/mvp-roadmap.md, .cc/context/architecture-outline.md, .cc/context/domain-language.md, .cc/context/dev-map.md, .cc/changes/task-board.md]
    validates: [project_goal, target_users, mvp_scope, out_of_scope, backlog_bridge, planned_path_status, memory_policy, blocking_project_decision_user_choice]
    forbids: [business_code_write, change_creation, auto_enter_propose, auto_enter_apply, treat_project_unknowns_as_resolved, treat_planned_paths_as_confirmed_facts, mark_project_definition_complete_without_blocking_choices]
    auto_validation: []

  cc-preflight:
    category: harness
    roles: [pm-orchestrator, gatekeeper, harness-maintainer]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [structured_preflight_result]
    writes: []
    validates: [harness_structure, commands, checkpoints, schemas, scripts, harness_config, workflow_definition, dev_map, task_board, role_contracts, memory_policy]
    forbids: [scan_business_code_deeply, create_business_change, auto_fix_scaffold, expand_into_project_audit]
    auto_validation: []

  cc-init:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [.cc/context/project-summary.md, .cc/context/project-context.md, .cc/context/domain-language.md, .cc/context/dev-map.md]
    writes: [.cc/context/project-summary.md, .cc/context/project-context.md, .cc/context/domain-language.md, .cc/context/dev-map.md]
    validates: [claude_scaffold_exists, entrypoints_status_recorded, domain_language_status_recorded, unknowns_recorded, memory_policy]
    forbids: [create_scaffold_assets, create_change_or_audit, deep_code_review, expand_into_enrich_explain_or_inspect, record_assumptions_as_facts, treat_planned_paths_as_confirmed_facts]
    auto_validation: []

  cc-enrich-context:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: []
    outputs: [.cc/context/project-context.md, .cc/context/domain-language.md, .cc/context/dev-map.md]
    writes: [.cc/context/project-context.md, .cc/context/domain-language.md, .cc/context/dev-map.md]
    validates: [base_context_exists, assumptions_confirmed, domain_language_terms_confirmed_or_pending, evidence_locations, confidence_level, memory_policy, blocking_assumption_user_confirmation]
    forbids: [finding_output, change_creation, audit_creation, assumptions_as_facts, auto_review_or_apply, treat_listed_assumptions_as_confirmed, write_unconfirmed_blocking_assumption_as_fact]
    auto_validation: []

  cc-explain-system:
    category: context
    roles: [pm-orchestrator, context-curator]
    change_from: [none]
    change_to: unchanged
    inputs: [optional_scope]
    outputs: [.cc/context/system-overview.md]
    writes: [.cc/context/system-overview.md]
    validates: [code_evidence, config_evidence, flow_evidence, bounded_scope]
    forbids: [finding_output, change_creation, audit_creation, business_code_write, preference_as_fact]
    auto_validation: []

  cc-inspect-codebase:
    category: audit
    roles: [pm-orchestrator, reviewer]
    subagents: [mode-audit-reviewer, scope-split-reviewer]
    change_from: [none]
    change_to: unchanged
    inputs: [mode, optional_scope]
    outputs: [.cc/audits/<audit-id>/report.md]
    writes: [.cc/audits/<audit-id>/report.md]
    validates: [valid_mode, bounded_scope, evidence_per_finding]
    forbids: [auto_fix, create_change_docs, review_existing_change_implementation, unsupported_findings, enter_promote_audit_automatically]
    auto_validation: []

  cc-promote-audit:
    category: audit_bridge
    roles: [pm-orchestrator, requirement-analyst, backlog-curator]
    change_from: [none]
    change_to: unchanged
    inputs: [audit_id, change_id]
    outputs: [.cc/audits/<audit-id>/to-change.md, .cc/changes/task-board.md]
    writes: [.cc/audits/<audit-id>/to-change.md, .cc/changes/task-board.md]
    validates: [finding_selection, scope_reduction, split_boundary, verification_level_hint, task_board_not_spec, finding_selection_user_choice]
    forbids: [copy_entire_audit_verbatim, write_formal_change_spec_directly, merge_unrelated_findings, auto_enter_propose, treat_all_findings_as_selected_by_default, write_bridge_without_finding_selection_choice]
    auto_validation: []

  cc-propose:
    category: change
    roles: [pm-orchestrator, requirement-analyst, solution-designer, backlog-curator, gatekeeper]
    change_from: [none, propose]
    change_to: propose
    inputs: [requirement_description]
    outputs: [.cc/changes/<change-id>/spec.md, .cc/changes/<change-id>/tasks.md, .cc/changes/<change-id>/log.md, .cc/changes/task-board.md]
    writes: [.cc/changes/<change-id>/spec.md, .cc/changes/<change-id>/tasks.md, .cc/changes/<change-id>/log.md, .cc/changes/task-board.md]
    validates: [hard_gate, validation_matrix, dependencies, scope_freeze, task_traceability, task_board_sync, clarification_interaction, risk_resolution_interaction, hard_gate_user_choice]
    forbids: [write_business_code, enter_apply_without_hard_gate, skip_scope_freeze, skip_validation_mapping, create_oversized_or_mixed_scope_change, treat_listed_clarifications_as_resolved, treat_recommended_risk_resolution_as_if_user_selected_it, present_hard_gate_without_user_choice]
    auto_validation: ["cc-deps conflicts --change <change-id>", "cc-verify --harness-only --change <change-id>"]

  cc-apply:
    category: change
    roles: [pm-orchestrator, developer, test-verifier, context-curator, backlog-curator, gatekeeper]
    subagents: [task-worker, test-verifier, context-curator]
    change_from: [propose, apply]
    change_to: review
    inputs: [change_id]
    outputs: [business_code_changes, change_docs_update, dev_map_update_if_needed, task_board_update, optional_commits]
    writes: [task_declared_code_files, test_files, .cc/changes/<change-id>/spec.md, .cc/changes/<change-id>/tasks.md, .cc/changes/<change-id>/log.md, .cc/changes/<change-id>/test-spec.md, .cc/context/dev-map.md, .cc/changes/task-board.md]
    validates: [hard_gate, task_gate, minimum_verification, git_policy, dirty_worktree_policy, baseline_delta, memory_sync, hard_gate_resolution_choice]
    forbids: [out_of_scope_change_without_spec_review_flag, silently_expand_implementation_beyond_spec_boundary, defer_minimum_verification_to_cc_test, mark_done_without_evidence, auto_push_or_merge, start_apply_with_stale_or_missing_hard_gate, treat_missing_hard_gate_as_user_confirmation]
    auto_validation: ["cc-deps check --change <change-id>", "cc-verify --json --output .cc/changes/<change-id>/baseline/pre-apply.json --change <change-id>", "cc-delta-check --before <before-report> --after <after-report>", "cc-verify --change <change-id>", "cc-budget-check"]

  cc-review:
    category: change
    roles: [pm-orchestrator, spec-reviewer, code-quality-reviewer, reviewer, backlog-curator, gatekeeper]
    subagents: [spec-reviewer, code-quality-reviewer]
    change_from: [review]
    change_to: review
    inputs: [change_id]
    outputs: [.cc/changes/<change-id>/review.md, .cc/changes/task-board.md]
    writes: [.cc/changes/<change-id>/review.md, .cc/changes/<change-id>/log.md, .cc/changes/task-board.md]
    validates: [task_coverage, verification_evidence, finding_status, evidence_matrix, role_contracts, finding_acceptance_interaction]
    forbids: [direct_code_change, direct_archive, pass_with_open_critical_or_important, delete_audit_record, mark_finding_accepted_without_user_choice, treat_reviewer_recommendation_as_user_acceptance]
    auto_validation: ["cc-role-check --command cc-review --change <change-id>", "cc-verify --harness-only --change <change-id>", "cc-budget-check"]

  cc-fix:
    category: change
    roles: [pm-orchestrator, developer, test-verifier, context-curator, backlog-curator, gatekeeper]
    subagents: [root-cause-reviewer, fix-worker, test-verifier]
    change_from: [review]
    change_to: review
    inputs: [change_id, optional_fix_description]
    outputs: [fixed_code, updated_findings, synced_change_docs, task_board_update]
    writes: [finding_related_code_files, test_files, .cc/changes/<change-id>/review.md, .cc/changes/<change-id>/log.md, .cc/changes/<change-id>/spec.md, .cc/changes/<change-id>/tasks.md, .cc/changes/<change-id>/test-spec.md, .cc/context/dev-map.md, .cc/changes/task-board.md]
    validates: [finding_exists, root_cause, minimum_fix, verification_level_not_reduced, memory_sync, finding_clarification_or_disposition_choice]
    forbids: [handle_unrecorded_scope, bypass_review, delete_open_finding_record, mark_fixed_without_verification, treat_unclear_finding_as_confirmed, mark_finding_accepted_without_user_choice]
    auto_validation: ["cc-verify --change <change-id>"]

  cc-test:
    category: change
    roles: [pm-orchestrator, test-verifier, backlog-curator, gatekeeper]
    subagents: [test-verifier]
    change_from: [apply, review]
    change_to: unchanged
    inputs: [change_id, optional_mode]
    outputs: [.cc/changes/<change-id>/test-spec.md, tests_or_evidence, updated_mapping_status, task_board_update]
    writes: [test_files, .cc/changes/<change-id>/test-spec.md, .cc/changes/<change-id>/log.md, .cc/changes/<change-id>/spec.md, .cc/changes/task-board.md]
    validates: [valid_mode, recovery_blocker_record, fresh_evidence, mapping_closure, task_board_sync]
    forbids: [use_cc_test_as_default_apply_minimum_verification, fabricate_red_green, mark_mapping_closed_without_evidence]
    auto_validation: ["cc-verify --change <change-id>"]

  cc-archive:
    category: change
    roles: [pm-orchestrator, backlog-curator, gatekeeper]
    change_from: [review]
    change_to: done
    inputs: [change_id]
    outputs: [done_status, archival_log, task_board_archive_state, optional_knowledge]
    writes: [.cc/changes/<change-id>/spec.md, .cc/changes/<change-id>/log.md, .cc/changes/task-board.md, .cc/knowledge/*]
    validates: [review_pass, no_open_findings, no_blocked_tasks, no_unexplained_gap, fresh_evidence, memory_policy, knowledge_decision_user_choice]
    forbids: [business_code_write, skip_knowledge_decision, archive_with_open_or_blocked_state, set_done_from_other_command, infer_knowledge_decision_without_user_choice, mark_done_before_knowledge_choice]
    auto_validation: ["cc-verify --change <change-id>"]
