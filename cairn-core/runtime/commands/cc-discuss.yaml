command: cc-discuss
summary: Refine a vague idea through interactive AI-guided discussion with proactive web research, existing project analysis, and deep reasoning before creating a formal spec or new project.

inputs:
  required:
    - topic_description
  optional:
    - discuss_id
    - research_depth
    - discuss_mode
    - continue_discussion

state:
  change_from:
    - none
  change_to: unchanged

writes:
  - .cairness/discussions/<discuss-id>/brief.md
  - .cairness/discussions/<discuss-id>/log.md

forbids:
  - business_code_write
  - change_creation
  - auto_enter_propose
  - auto_enter_new_project
  - fabricate_research
  - skip_challenging_assumptions
  - treat_vague_input_as_ready
  - skip_routing_selection

required_reads:
  - .cairness/context/project-summary.md
  - .cairness/context/dev-map.md
  - .cairness/knowledge/index.md

optional_reads:
  - .cairness/context/project-context.md
  - .cairness/context/domain-language.md

conditional_reads:
  when_writing_discussion_artifacts:
    - .claude/templates/discussions/brief.md
    - .claude/templates/discussions/log.md
  when_previous_discussion_exists:
    - .cairness/discussions/<discuss-id>/brief.md
    - .cairness/discussions/<discuss-id>/log.md

runtime_protocol_reads:
  technology_catalog: on_demand
  language_profile: on_demand

preconditions:
  - topic_is_not_already_an_active_formal_change
  - generate_or_reuse_discuss_id
  - confirm_discussion_mode_new_or_continue
  - classify_research_depth_default_or_user_specified
  - perform_background_research_before_entering_discussion_loop
  - identify_and_present_relevant_project_context
  - distinguish_facts_from_uncertainties
  - flag_upstream_or_external_constraints_early
  - when_assumptions_mode_research_then_present_assumptions_for_confirmation
  - run_brief_self_review_before_presenting_to_user

interaction_contract:
  mode: interactive_required
  clarification:
    when: topic_scope_goals_or_constraints_are_unclear
    presentation:
      - summarize_current_understanding_and_key_findings
      - present_research_findings_before_asking_questions
      - ask_numbered_open_ended_questions_one_at_a_time
      - challenge_user_assumptions_with_evidence_and_alternatives
      - offer_better_suggestions_when_user_path_has_known_pitfalls
      - present_pro_con_comparison_for_key_design_choices
      - periodically_summarize_convergence_progress
      - remind_user_they_can_say_ready_to_consolidate_at_any_time
      - when_assumptions_mode_present_structured_assumptions_list_with_confidence_and_ask_bulk_confirmation
      - allow_user_to_switch_between_interactive_and_assumptions_mode
    blocking_behavior:
      - do_not_write_brief_with_unresolved_core_ambiguities
      - continue_discussion_until_user_confirms_ready
      - next_action_must_be_answer_question_or_signal_ready
      - when_in_assumptions_mode_do_not_proceed_until_assumptions_are_confirmed_or_corrected
      - when_in_assumptions_mode_do_not_treat_user_silence_as_confirmation
    max_questions_per_round: 3
    resolution_required_before_ready: true
  confirmation:
    when: user_signals_ready_to_consolidate_brief
    presentation:
      - present_consolidated_brief_draft_based_on_discussion
      - show_key_decisions_and_intentionally_open_questions
      - ask_user_to_confirm_revise_or_continue_discussing
    confirmation_options:
      - confirm_write_brief_and_end_discussion_loop
      - revise_brief_before_writing
      - continue_discussing
    required_confirmations:
      - brief_accurately_reflects_discussed_scope
      - open_questions_intentionally_deferred
      - user_ready_to_decide_next_step
    blocking_behavior:
      - do_not_end_discussion_without_brief_confirmation
      - next_action_must_be_confirm_revise_or_continue
  selection:
    when: brief_written_and_confirmed
    presentation:
      - show_routing_options_with_context
      - suggest_most_likely_path_based_on_discussion_content
      - show_how_to_reference_brief_from_downstream_commands
      - wait_for_user_selection
    confirmation_options:
      - create_new_project_via_cc_new_project
      - create_change_proposal_via_cc_propose
      - continue_discussing_current_topic
      - park_discussion_and_exit
    required_confirmations:
      - user_selected_next_action
      - user_understands_brief_location_for_downstream_commands
    blocking_behavior:
      - do_not_exit_without_routing_decision
      - next_action_must_be_user_selected_path

topic_rules:
  when_discussion_involves_external_or_version_sensitive_technology:
    - .claude/runtime/topic-rules/source-driven-development.yaml
  when_discussion_touches_security_boundary:
    - .claude/runtime/topic-rules/security.yaml
  when_discussion_touches_database_or_data_model:
    - .claude/runtime/topic-rules/database-changes.yaml
  when_discussion_touches_api_or_external_contract:
    - .claude/runtime/topic-rules/api-compatibility.yaml
  when_project_context_has_domain_language_conflicts:
    - .claude/runtime/topic-rules/source-driven-development.yaml
  when_assumptions_mode_is_activated:
    - .claude/runtime/topic-rules/discussion-assumptions-mode.yaml
  when_knowledge_keyword_matched:
    - .claude/runtime/topic-rules/knowledge-loading.yaml

subagents:
  enabled: true
  policy: .claude/docs/maintenance/subagent-model.md
  contract: .claude/runtime/subagents/cc-discuss.yaml

steps:
  - resolve_discuss_id_new_or_existing
  - read_project_summary_and_navigation
  - dispatch_research_subagent_for_domain_and_topic_research
  - dispatch_project_context_subagent_for_relevance_analysis
  - synthesize_research_findings_into_initial_context
  - present_what_is_known_and_what_needs_clarification
  - engage_in_open_ended_discussion_loop
  - challenge_user_assumptions_with_research_evidence
  - offer_alternative_approaches_with_tradeoffs
  - periodically_summarize_convergence
  - ask_clarifying_questions_one_at_a_time_max_3_per_round
  - wait_for_user_response_or_ready_signal
  - when_user_says_ready_present_consolidated_brief_draft
  - confirm_brief_accuracy_with_user
  - run_brief_self_review_check_placeholders_consistency_scope_ambiguity
  - fix_self_review_issues_before_presenting_to_user
  - load_brief_and_log_templates
  - write_brief_md
  - write_log_md
  - present_routing_selection_and_wait_for_user_choice
  - when_assumptions_mode_present_structured_assumptions_with_confidence_and_rationale
  - when_assumptions_mode_allow_bulk_confirmation_or_correction_per_assumption
  - when_assumptions_mode_allow_switch_to_interactive_at_any_time

anti_rationalizations:
  - claim_vague_idea_is_ready_for_spec_without_discussion
  - skip_research_because_user_seems_confident
  - avoid_challenging_user_assumptions_to_keep_discussion_short
  - present_unsupported_technology_claims_to_speed_up_discussion
  - fabricate_project_analysis_rather_than_reading_actual_code
  - dismiss_user_idea_rather_than_helping_clarify_it
  - force_convergence_when_user_wants_more_discussion
  - treat_open_questions_as_resolved_in_brief
  - skip_presenting_better_alternatives_when_user_is_fixated
  - write_brief_without_user_confirmation
  - auto_select_routing_path_without_user_choice
  - skip_brief_self_review_because_brief_looks_clean
  - skip_brief_self_review_to_save_tokens_or_time
  - treat_brief_self_review_as_substitute_for_user_review
  - when_assumptions_mode_present_assumptions_without_research
  - when_assumptions_mode_treat_silence_as_full_confirmation
  - when_assumptions_mode_reject_user_switch_to_interactive_request

red_flags:
  - research_subagent_returned_no_evidence
  - user_idea_conflicts_with_existing_project_architecture_without_addressing_it
  - discussion_going_in_circles_without_convergence
  - brief_contains_no_research_findings_or_external_references
  - brief_is_just_restating_vague_original_input
  - user_pressured_into_cc_propose_or_cc_new_project_before_ready
  - technology_claims_without_source_references_in_brief
  - domain_term_conflict_identified_but_not_recorded
  - routing_selection_not_presented_after_brief_written
  - brief_self_review_not_performed_before_user_review
  - brief_self_review_found_unresolved_placeholder_or_inconsistency_not_fixed
  - brief_presented_to_user_still_contains_tbd_or_todo
  - when_assumptions_mode_assumptions_presented_without_confidence_levels
  - when_assumptions_mode_research_not_completed_before_assumptions_presented

auto_validation: []

result_contract:
  profile: .claude/runtime/result-contracts/standard-command.yaml
  evidence:
    required: true
    sources:
      - written_artifacts
      - research_findings
      - discussion_log
      - interaction_state
      - project_relevance_analysis
  risks:
    required: true
    sources:
      - stop_conditions
      - forbids
      - red_flags
      - research_gaps
  next_actions:
    - run_cc_new_project_with_brief_as_project_idea
    - run_cc_propose_with_brief_as_requirement_description
    - continue_discussion_with_same_discuss_id
    - run_additional_research_on_specific_area

stop_conditions:
  - missing_required_argument
  - topic_already_has_active_formal_change
  - user_selected_routing_and_confirmed_brief
  - user_requests_to_abort
  - research_failed_with_insufficient_evidence
  - discussion_max_rounds_exceeded_without_convergence
