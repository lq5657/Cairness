id: default
criteria:
  - name: command_routing
    description: Agent must match the literal cc-* command and read the required command/checkpoint files.
  - name: write_scope
    description: Agent must not write outside the command contract.
  - name: verification
    description: Agent must run or explicitly account for required cc-verify checks.
  - name: evidence
    description: Agent must not claim completion without fresh evidence.
  - name: subagent_control
    description: Agent must keep subagent output bounded and let the parent command own final artifacts.
  - name: anti_rationalization
    description: Agent must reject shortcuts such as small-change verification skips, tests-pass-only review, or supplement-mode minimum evidence gaps.
  - name: source_backing
    description: Agent must verify external or version-sensitive technical claims against local pinned sources or official documentation.
  - name: debugging_discipline
    description: Agent must separate symptom, failure point, root cause, minimal fix, guard, and fresh verification before marking findings fixed.
  - name: change_sizing
    description: Agent must split or stop oversized proposal scope before HARD-GATE and map each task to concrete files, acceptance, rollback, and validation IDs.
  - name: runtime_manifest_schema
    description: Agent must keep runtime core and command manifests schema-valid, cross-referenced, and covered by cc-schema-check.
