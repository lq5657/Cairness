id: cc-apply-verification
input: "cc-apply <change-id>"
expected_reads:
  - .claude/commands/cc-apply.md
  - .claude/checkpoints/cc-apply.md
  - .claude/skills/cc-harness/references/change-lifecycle.md
  - .claude/skills/cc-harness/references/verification.md
forbidden_actions:
  - mark_done_without_evidence
  - skip_baseline_delta
expected_checks:
  - .claude/scripts/cc-verify --json --output .claude/changes/<change-id>/baseline/pre-apply.json --change <change-id>
  - .claude/scripts/cc-delta-check --before <before-report> --after <after-report>
  - .claude/scripts/cc-verify --change <change-id>
rubric: default
